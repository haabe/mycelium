name: Validate Template Integrity

on:
  push:
    branches: [main]
    paths:
      - '.claude/**'
      - '*.md'
      - 'tests/**'
      - 'requirements-ci.txt'
      - '.github/workflows/validate.yml'
  pull_request:
    branches: [main]
    paths:
      - '.claude/**'
      - '*.md'
      - 'tests/**'
      - 'requirements-ci.txt'
      - '.github/workflows/validate.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run structural integrity validation
        run: bash tests/validate-template.sh

      - name: Run canvas schema + trace validation
        run: python3 .claude/scripts/validate_canvas.py
