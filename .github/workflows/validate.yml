name: Validate Template Integrity

on:
  push:
    branches: [main]
    paths:
      - '.claude/**'
      - '*.md'
      - '.claude/tests/**'
      - 'requirements-ci.txt'
      - '.github/workflows/validate.yml'
  pull_request:
    branches: [main]
    paths:
      - '.claude/**'
      - '*.md'
      - '.claude/tests/**'
      - 'requirements-ci.txt'
      - '.github/workflows/validate.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run structural integrity validation (includes Check 17 — ruff/shellcheck/pytest with baseline-aware logic)
        run: bash .claude/tests/validate-template.sh

      - name: Run canvas schema + trace validation
        run: python3 .claude/scripts/validate_canvas.py

      - name: Run Python unit tests with coverage (verbose output for CI logs)
        run: |
          pytest .claude/tests/python/ -v \
            --cov=.claude/scripts \
            --cov-report=term \
            --cov-report=xml

      # Note: standalone ruff and shellcheck checks were removed 2026-05-03.
      # validate-template.sh Check 17 already runs both with the correct
      # baseline-aware thresholds (e.g., shellcheck pre-existing warnings in
      # gate.sh + session-start.sh are tolerated; only regression above
      # baseline FAILs). Running them standalone here duplicated the logic
      # AND used the wrong threshold (shellcheck exits non-zero on ANY
      # warning, which doesn't match the baseline rule). Single source of
      # truth = Check 17 in validate-template.sh.
