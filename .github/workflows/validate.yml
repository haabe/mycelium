name: Validate Template Integrity

on:
  push:
    branches: [main]
    paths:
      - '.claude/**'
      - '*.md'
      - '.claude/tests/**'
      - 'requirements-ci.txt'
      - '.github/workflows/validate.yml'
  pull_request:
    branches: [main]
    paths:
      - '.claude/**'
      - '*.md'
      - '.claude/tests/**'
      - 'requirements-ci.txt'
      - '.github/workflows/validate.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run structural integrity validation (includes Check 17 — ruff/shellcheck/pytest)
        run: bash .claude/tests/validate-template.sh

      - name: Run canvas schema + trace validation
        run: python3 .claude/scripts/validate_canvas.py

      - name: Run Python unit tests with coverage
        run: |
          pytest .claude/tests/python/ -v \
            --cov=.claude/scripts \
            --cov-report=term \
            --cov-report=xml

      - name: Run ruff (Python lint) standalone
        run: |
          ruff check .claude/scripts/_manifest_lib.py \
                     .claude/scripts/framework_guard.py \
                     .claude/scripts/parse_manifest.py \
            --select=ALL \
            --ignore=D,ANN,COM,T20,S603,S607,EM,TRY003,FBT,PTH,INP001

      - name: Run shellcheck (Bash lint) standalone
        run: |
          shellcheck -S warning \
            .claude/scripts/*.sh \
            .claude/hooks/*.sh \
            .claude/tests/*.sh || \
          (echo "Shellcheck warnings exceed baseline. Pre-existing warnings in gate.sh + session-start.sh are tolerated; new warnings should be addressed." && exit 1)
