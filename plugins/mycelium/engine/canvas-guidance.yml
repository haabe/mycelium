# Canvas Guidance: Two Dimensions
# Dimension 1: Project type (determines strategic ceremony level)
# Dimension 2: Delivery type (determines quality requirements)
# Set during /interview and /delivery-bootstrap based on classification
#
# KEY RULE: Delivery type overrides project type for quality items.
# A solo_hobby project that is user_facing MUST check services.yml + a11y.
# Project type only makes STRATEGIC canvases optional (GTM, team shape, landscape).

# ============================================================
# Canvas Versioning Metadata (_meta schema)
# ============================================================
# Every canvas YAML file SHOULD include a `_meta` block for staleness
# detection and structural classification. Added by skills that write
# canvas files; checked by /canvas-health for drift.
#
# Schema:
#   _meta:
#     version: <integer>           # Incremented on each meaningful update
#     last_validated: <YYYY-MM-DD> # Date the content was last confirmed accurate
#     evidence_type: <string>      # interview | survey | analytics | speculation | assumption
#     structural_level: <string>   # One of: list | schema | taxonomy | reference
#
# structural_level (from aiops3000's "spectrum of structured knowledge"):
#   list       — flat collection of items (e.g., early opportunities.yml)
#   schema     — typed fields with validation rules (e.g., purpose.yml)
#   taxonomy   — hierarchical classification (e.g., jobs-to-be-done.yml with OST)
#   reference  — versioned, cross-referenced knowledge artifact (e.g., threat-model.yml)
#
# /canvas-health checks:
#   - Missing _meta blocks
#   - last_validated older than 30 days
#   - version not incremented after content changes
#   - evidence_type inconsistent with confidence level
#
# Source: aiops3000 ("Metadata Is the New Code"), Karpathy (knowledge base health checks)

# ============================================================
# Canvas Auto-Index (canvas/_index.yml)
# ============================================================
# Auto-generated by /canvas-health. Provides a compact snapshot
# of all canvas files — their confidence, evidence type, last
# validated date, and staleness status. Enables quick pre-task
# scanning without reading every canvas file individually.
#
# Schema:
#   generated_at: <ISO timestamp>
#   canvas_count: <integer>
#   files:
#     <filename>:
#       exists: <boolean>
#       confidence: <float>
#       evidence_type: <string>
#       last_validated: <YYYY-MM-DD or null>
#       stale: <boolean>        # true if last_validated > 30 days ago
#       size_bytes: <integer>
#   health:
#     critical: <integer>       # count of critical issues
#     warnings: <integer>       # count of warnings
#     status: <HEALTHY|WARNINGS|CRITICAL>
#
# Source: Karpathy (auto-maintained index files)

project_types:

  solo_hobby:
    description: "Personal project, learning exercise, or hobby. Single developer, no commercial intent."
    required:
      - purpose.yml        # Always know WHY you're building. Includes constraints section (technical/political/regulatory) from /interview Phase 5b (Brown).
      - north-star.yml     # Define what success looks like
      - opportunities.yml  # Map what to build (even for small projects)
      - gist.yml           # Plan your goals and ideas
    recommended:
      - jobs-to-be-done.yml  # Deeper need understanding
      - user-needs.yml       # User needs beyond your own assumptions
      - scenarios.yml        # User scenarios carrying context through L2→L5 (Hoskins)
    optional:
      - landscape.yml        # Not needed without competitors
      - team-shape.yml       # Solo, no team to shape
      - services.yml         # Lightweight projects may not need formal service check
      - go-to-market.yml     # No go-to-market for hobby
      - dora-metrics.yml     # No delivery metrics for hobby
      - threat-model.yml     # Only if handling user data
      - privacy-assessment.yml # Only if collecting data
      - trust-signals.yml    # No trust architecture for personal project
      - bvssh-health.yml     # Lightweight self-check sufficient
      - human-tasks.yml      # Optional for hobby projects
      - archived-solutions.yml  # Created automatically when leaves are discarded
      - cycle-history.yml       # Created automatically by /retrospective and /launch-tier
      - thresholds.yml          # Created by /framework-health after 10+ cycles

  solo_product:
    description: "Solo developer building a real product. May have users, may generate revenue."
    required:
      - purpose.yml           # Includes constraints section (technical/political/regulatory) from /interview Phase 5b (Brown)
      - north-star.yml
      - opportunities.yml
      - gist.yml
      - jobs-to-be-done.yml
      - user-needs.yml
      - threat-model.yml     # Products need security thinking
      - services.yml         # Products need service quality
      - scenarios.yml        # User scenarios carrying context through L2→L5 (Hoskins)
    recommended:
      - privacy-assessment.yml
      - dora-metrics.yml
      - landscape.yml
      - go-to-market.yml
      - human-tasks.yml      # Track offline evidence-gathering tasks
      - archived-solutions.yml  # Created automatically when leaves are discarded
      - cycle-history.yml       # Created automatically by /retrospective and /launch-tier
      - thresholds.yml          # Created by /framework-health after 10+ cycles
    optional:
      - team-shape.yml
      - trust-signals.yml
      - bvssh-health.yml

  team_startup:
    description: "Small team (2-10) building a product. Likely has users, revenue goals, competitive landscape."
    required:
      - purpose.yml
      - north-star.yml
      - opportunities.yml
      - gist.yml
      - jobs-to-be-done.yml
      - user-needs.yml
      - scenarios.yml        # User scenarios carrying context through L2→L5 (Hoskins)
      - threat-model.yml
      - services.yml
      - team-shape.yml       # Team structure matters
      - go-to-market.yml     # Need to reach users
      - landscape.yml        # Competitive awareness
    recommended:
      - privacy-assessment.yml
      - dora-metrics.yml
      - bvssh-health.yml
      - trust-signals.yml
      - bounded-contexts.yml  # DDD: important once team has multiple services/domains
      - human-tasks.yml      # Track offline evidence-gathering tasks
      - archived-solutions.yml  # Created automatically when leaves are discarded
      - cycle-history.yml       # Created automatically by /retrospective and /launch-tier
      - thresholds.yml          # Created by /framework-health after 10+ cycles
    optional: []

  team_enterprise:
    # CURRENTLY LATENT (as of v0.15.x): The framework supports this tier
    # structurally, but Mycelium's L4-L5 work is not yet seasoned for enterprise
    # scale. purpose.yml#who.secondary names "established product teams" as a
    # secondary segment that "needs Mycelium to mature before serving well."
    # This tier exists so /interview can classify enterprise-shaped projects
    # without breaking, but the framework does not yet claim enterprise readiness.
    # Promote to first-class once cycle history accumulates evidence from the
    # tier (target: ≥3 enterprise project_type cycles with retrospectives).
    description: "Larger team or enterprise product. Regulatory requirements, compliance needs, multiple stakeholders. (Currently latent — see comment above; primary segment is solo_product / team_startup per purpose.yml.)"
    required:
      - purpose.yml
      - north-star.yml
      - opportunities.yml
      - gist.yml
      - jobs-to-be-done.yml
      - user-needs.yml
      - scenarios.yml        # User scenarios carrying context through L2→L5 (Hoskins)
      - threat-model.yml
      - services.yml
      - team-shape.yml
      - go-to-market.yml
      - landscape.yml
      - privacy-assessment.yml  # Compliance requires this
      - dora-metrics.yml        # Delivery performance tracked
      - bvssh-health.yml        # Holistic health monitoring
      - trust-signals.yml       # Trust architecture for enterprise
      - bounded-contexts.yml   # DDD: required for multi-team architecture
      - human-tasks.yml        # Track offline evidence-gathering tasks
      - archived-solutions.yml  # Created automatically when leaves are discarded
      - cycle-history.yml       # Created automatically by /retrospective and /launch-tier
      - thresholds.yml          # Created by /framework-health after 10+ cycles
    recommended: []
    optional: []

# ============================================================
# Dimension 1b: Dogfood Modifier (orthogonal to project_type)
# ============================================================
# When a project is primarily a vehicle for learning/testing Mycelium itself,
# set `dogfood: true` in diamonds/active.yml. The object project (macos-fileviewer,
# cli tool, web app, etc.) is the VEHICLE; the real goal is exercising the
# framework and capturing gaps.
#
# When dogfood is true, Mycelium interprets theory gates and evidence
# requirements more loosely:
#
# - Mocked personas (via /mocked-persona-interview) become acceptable
#   evidence, with evidence_type: speculation and honest stop conditions.
# - "Validation appears to fail" becomes a Mycelium learning documented in
#   .claude/evals/dogfood-reports/, not a project death.
# - Theory gates relax: the Evidence gate accepts "documented Mycelium
#   learning" as substitute for real user research.
# - BVSSH gate becomes self-attestation rather than stakeholder validation.
# - The object project's L4 delivery may be deferred or skipped entirely.
#
# Dogfood mode is an ADDITIVE modifier, not a 5th project_type. A dogfood
# project is still solo_hobby or solo_product underneath — the modifier
# just softens the evidence requirements and opens the mocked-persona path.

dogfood_modifier:
  description: "Flag that this project is primarily a vehicle for testing/learning Mycelium itself"
  stored_as: "diamonds/active.yml :: dogfood: true"
  detected_via: "/interview Phase 6 question: 'Is this primarily a real product, or are you using this as a vehicle to test/learn Mycelium itself?'"
  effects_when_true:
    - "Mocked personas via /mocked-persona-interview are acceptable evidence"
    - "evidence_type: speculation is honest — do not over-inflate"
    - "Stop conditions become Mycelium learnings, not project deaths"
    - "Framework gaps are captured in .claude/evals/dogfood-reports/"
    - "L4 Delivery of the object project may be deferred indefinitely"
    - "The real deliverable is the dogfood report, not the object project"
  references:
    - "${CLAUDE_PLUGIN_ROOT}/engine/dogfood-mode.md"
    - "${CLAUDE_PLUGIN_ROOT}/skills/mocked-persona-interview/SKILL.md"
  source: "Dogfood finding G1 from the first dogfood session (2026-04-09). The session revealed that meta-projects need explicit framework support — without it, agents invent discipline on the spot."

# ============================================================
# Dimension 2: Product Type (v0.11.0)
# Determines which delivery profile, metrics canvas, and quality
# frameworks apply. Orthogonal to project_type (solo/team) and
# delivery_type (UI/API/CLI). Set during /interview Phase 6.
# Stored in diamonds/active.yml as product_type.
# ============================================================

product_types:

  software:
    description: "Code-based product: web app, mobile app, API, CLI, library, desktop app"
    detection: "Package manifests (package.json, Cargo.toml, etc.), source code files, build tools"
    delivery_profile: software
    delivery_canvas: dora-metrics.yml
    quality_frameworks:
      - OWASP                 # Security
      - WCAG                  # Accessibility (if user-facing)
      - testing_pyramid       # Unit/integration/e2e
      - DORA                  # Deployment metrics
    notes: "Default. All existing Mycelium L4/L5 behavior applies unchanged."

  content_course:
    description: "Educational content: online course, workshop, certification program, tutorial series"
    detection: "Curriculum outline, lesson plans, LMS config (Teachable, Thinkific, Udemy), video scripts with learning objectives"
    delivery_profile: content
    delivery_canvas: content-metrics.yml
    quality_frameworks:
      - instructional_design  # Bloom's taxonomy, learning objectives alignment
      - accessibility_content # Captions, transcripts, alt text, readable typography
      - content_review        # SME review, fact-checking, no unsupported claims

  content_publication:
    description: "Written content: ebook, newsletter, documentation, knowledge base, blog"
    detection: "Manuscript files, chapter outlines, editorial calendar, *.epub, *.docx with chapter structure"
    delivery_profile: content
    delivery_canvas: content-metrics.yml
    quality_frameworks:
      - editorial_review      # Factual accuracy, style consistency, source attribution
      - accessibility_content # Alt text, readable typography, structured headings

  content_media:
    description: "Media content: video series, podcast, YouTube channel, audio course"
    detection: "Video scripts, *.srt/*.vtt subtitle files, episode outlines, podcast RSS, media production pipeline"
    delivery_profile: content
    delivery_canvas: content-metrics.yml
    quality_frameworks:
      - production_quality    # Audio/video quality, editing, pacing
      - accessibility_content # Captions, audio descriptions, transcripts

  ai_tool:
    description: "AI-powered tool: prompt library, fine-tuned model, AI agent, workflow automation, chatbot"
    detection: "Prompt templates, *.prompt files, agent definitions, model configs, API integration code importing anthropic/openai"
    delivery_profile: ai_tool
    delivery_canvas: ai-tool-metrics.yml
    quality_frameworks:
      - prompt_quality        # Evaluation, testing, consistency measurement
      - ai_safety             # Bias testing, red-teaming, harmful output prevention
      - OWASP                 # If has API surface
      - regulatory            # EU AI Act applies

  service_offering:
    description: "Service business: consulting, coaching, agency, freelance, productized service"
    detection: "Service blueprints, pricing documents, client onboarding docs, proposal templates"
    delivery_profile: service
    delivery_canvas: service-metrics.yml
    quality_frameworks:
      - service_blueprint     # End-to-end service flow mapping
      - client_satisfaction   # NPS/CSAT tracking

# ============================================================
# Product-Type Capability Map (v0.11.3)
# ============================================================
# Maps AI Interaction Atlas patterns to product types. Helps JiT
# tooling suggest relevant capabilities when a product type is
# identified. Not exhaustive — a starting framework.
#
# Source: AI Interaction Atlas (24 AI patterns)

product_type_capabilities:

  software:
    primary_patterns: [Generate, Transform, Validate, Detect]
    system_operations: [Build, Test, Deploy, Monitor]
    key_touchpoints: [code-review, ci-pipeline, error-reporting, user-feedback]

  content_course:
    primary_patterns: [Generate, Transform, Summarize, Evaluate]
    system_operations: [Publish, Review, Measure]
    key_touchpoints: [lesson-review, learner-feedback, completion-tracking, assessment]

  content_publication:
    primary_patterns: [Generate, Summarize, Extract, Transform]
    system_operations: [Publish, Review, Archive]
    key_touchpoints: [editorial-review, reader-feedback, distribution]

  content_media:
    primary_patterns: [Generate, Transform, Transcribe, Summarize]
    system_operations: [Produce, Publish, Distribute]
    key_touchpoints: [production-review, audience-feedback, engagement-tracking]

  ai_tool:
    primary_patterns: [Detect, Extract, Classify, Generate, Estimate]
    system_operations: [Evaluate, Test, Monitor, Safeguard]
    key_touchpoints: [eval-results, safety-check, user-feedback, bias-audit]
    note: "Requires additional EU AI Act assessment (G-S8)"

  service_offering:
    primary_patterns: [Generate, Recommend, Classify]
    system_operations: [Schedule, Track, Measure]
    key_touchpoints: [client-intake, service-delivery, satisfaction-survey, follow-up]

# ============================================================
# How Product Type and Delivery Type Interact (v0.11.0)
# ============================================================
# Product type and delivery type are COMPLEMENTARY, not competing:
#   - Product type determines the METRICS CANVAS (what you measure)
#   - Delivery type determines QUALITY FRAMEWORKS (what standards apply)
#   - Both apply simultaneously
#
# Example: content_course delivered via a web platform
#   -> product_type: content_course -> uses content-metrics.yml, instructional design
#   -> delivery_type: user_facing -> ALSO requires services.yml, a11y, usability check
#   The content quality gates check the CONTENT; the delivery type gates check the PLATFORM.
#
# Example: ai_tool with API endpoints
#   -> product_type: ai_tool -> uses ai-tool-metrics.yml, prompt quality, safety
#   -> delivery_type: api_service -> ALSO requires threat-model.yml, input validation
#   The ai_tool gates check prompt/model quality; the delivery type gates check the API.
#
# Rule: delivery type quality requirements are ADDITIVE to product type requirements.
# ============================================================

# ============================================================
# Dimension 3: Delivery Type (quality requirements)
# These override project_type for quality-related canvases.
# Detected by /delivery-bootstrap from file patterns.
# ============================================================

delivery_types:

  user_facing:
    description: "Has a UI that humans interact with (web app, desktop app, mobile app)"
    detection_patterns:
      - "*.tsx, *.jsx, *.vue, *.svelte, *.html"     # Web UI
      - "*.swift (with SwiftUI), *.xib, *.storyboard" # macOS/iOS UI
      - "*.xaml, *.razor"                              # .NET UI
      - "*.kt (with Compose), *.xml (Android layout)"  # Android UI
      - "*.dart (with Flutter widgets)"                # Flutter UI
    always_required_regardless_of_project_type:
      - services.yml         # Downe's 15 principles (G-V2 REVIEW)
      - "usability check"    # Nielsen's 10 heuristics (G-V10 REVIEW)
      - "a11y assessment"    # WCAG 2.1 AA (G-V8 REVIEW)
      - "error state design" # Downe P10 (G-V9 REVIEW)
    always_required_at_delivery_completion:
      - "tests exist"        # G-V7 REVIEW
      - "BVSSH quick-check"  # Smart (Fix 6)

  api_service:
    description: "Backend service with API endpoints"
    detection_patterns:
      - "*/api/*, */routes/*, */controllers/*, */handlers/*"
      - "*/middleware/*, */graphql/*"
      - "Dockerfile, docker-compose.yml with service definitions"
    always_required_regardless_of_project_type:
      - threat-model.yml     # STRIDE for all endpoints (G-S2 REVIEW)
      - "input validation"   # OWASP (G-S4 REVIEW)
    always_required_at_delivery_completion:
      - "tests exist"        # G-V7 REVIEW
      - "BVSSH quick-check"  # Smart

  library:
    description: "Reusable library or package"
    detection_patterns:
      - "exports/index pattern, no UI files"
      - "lib/ or src/ with public API, no application entry point"
    always_required_regardless_of_project_type:
      - "tests exist"        # Libraries MUST be tested (G-V7 REVIEW)
    always_required_at_delivery_completion:
      - "BVSSH quick-check"

  cli_tool:
    description: "Command-line interface tool"
    detection_patterns:
      - "argument parsing (yargs, commander, argparse, clap)"
      - "bin/ directory, executable entry point"
    always_required_regardless_of_project_type:
      - "input validation"   # CLI args are external input (G-S4 REVIEW)
      - "tests exist"        # G-V7 REVIEW
    always_required_at_delivery_completion:
      - "BVSSH quick-check"

  permission_requiring:
    description: "Uses system permissions (Accessibility, Camera, Contacts, Location, etc.)"
    detection_patterns:
      - "AXUIElement, Accessibility API"
      - "Camera, AVCaptureSession"
      - "Contacts, CNContactStore"
      - "Location, CLLocationManager"
      - "File system access beyond app sandbox"
    always_required_regardless_of_project_type:
      - threat-model.yml     # STRIDE for permission misuse (G-S2 REVIEW)
    note: "This type is additive -- a user_facing app that also requires permissions gets BOTH sets of requirements."

  sensitive_context:
    description: "Product handles sensitive user contexts: health, finance, domestic violence, government services, mental health, addiction recovery"
    detection_patterns:
      - "Health data handling, patient records, clinical workflows"
      - "Domestic violence support, crisis services, survivor resources"
      - "Government benefits, social services, immigration"
      - "Financial hardship, debt management, poverty support"
      - "Mental health, addiction, trauma recovery"
    always_required_regardless_of_project_type:
      - "trauma-informed design review"  # 5-point check in quality/CLAUDE.md (NUDGE)
    always_required_at_delivery_completion:
      - "safety exits exist"             # Users can leave without completing
      - "no re-traumatizing content"     # Content reviewed for harm potential
    note: "This type is additive -- a user_facing app that also handles sensitive contexts gets BOTH sets of requirements. Source: Hussain (Chayn), built on SAMHSA's 6 Principles (2014)."

# ============================================================
# Metric Sources (v0.14): which external metric sources feed
# which canvas fields. Used by /metrics-pull to draft evidence
# entries with the right target canvas file + evidence type.
#
# Sources are configured per-project in jit-tooling/active-metrics.yml.
# This section maps source_class -> candidate canvas files. Adapters
# refine the mapping in their "Canvas routing" section.
#
# Evidence types:
#   market_signal   -- external traction/attention (views, referrers, stars)
#   user_behavior   -- usage metrics (sessions, events, retention)
#   revenue_signal  -- monetization (MRR, conversions, churn)
#   support_signal  -- user-reported issues, tickets, sentiment
#   review_signal   -- ratings, reviews, NPS
# ============================================================

metric_sources:

  description: "Maps external metric source_classes to candidate canvas targets for evidence drafting."

  by_source_class:

    traffic:
      # e.g., github, plausible, google_analytics, fathom, posthog (pageview side)
      primary_canvas_targets:
        - file: purpose.yml
          evidence_type: market_signal
          when: "general traction evidence for L0 Purpose"
        - file: north-star.yml
          evidence_type: market_signal
          when: "north-star metric is traffic/engagement-based"
        - file: go-to-market.yml
          evidence_type: market_signal
          when: "within 14 days of a launch or campaign (L5)"
      secondary_canvas_targets:
        - file: opportunities.yml
          evidence_type: market_signal
          when: "unexplained referrers or paths hint at new underserved needs (L2)"

    events:
      # e.g., stripe, segment, sentry
      primary_canvas_targets:
        - file: north-star.yml
          evidence_type: revenue_signal
          when: "north-star metric is revenue/conversion-based"
        - file: dora-metrics.yml
          evidence_type: user_behavior
          when: "events indicate delivery/reliability signal (e.g., Sentry error rate)"
        - file: go-to-market.yml
          evidence_type: revenue_signal
          when: "conversion, activation, or revenue events during launch windows"
      secondary_canvas_targets:
        - file: purpose.yml
          evidence_type: market_signal
          when: "customer-count milestones"

    reviews:
      # e.g., app_store_connect, play_console, trustpilot
      primary_canvas_targets:
        - file: go-to-market.yml
          evidence_type: review_signal
          when: "review velocity, rating trends during/after launches"
        - file: opportunities.yml
          evidence_type: review_signal
          when: "recurring review themes suggest underserved needs"
      secondary_canvas_targets:
        - file: services.yml
          evidence_type: review_signal
          when: "reviews indicate service-quality issues (Downe)"
        - file: trust-signals.yml
          evidence_type: review_signal
          when: "rating average is a trust input"

    support:
      # e.g., intercom, zendesk, linear, github_issues
      primary_canvas_targets:
        - file: opportunities.yml
          evidence_type: support_signal
          when: "support volume concentrated on specific themes signals unmet needs (L2)"
        - file: services.yml
          evidence_type: support_signal
          when: "support load is a service-quality lagging indicator"
      secondary_canvas_targets:
        - file: jobs-to-be-done.yml
          evidence_type: support_signal
          when: "support requests reveal jobs the product isn't yet hired for"

  routing_rules:
    - "Adapters MAY override / narrow the mapping in their 'Canvas routing' section."
    - "Evidence entries are always drafted, never auto-written. User confirms before append."
    - "Every drafted entry MUST include provenance pointing back to the snapshot JSON."
    - "If a source's data does not fit any canvas target, /metrics-pull reports it as 'no canvas routing' rather than inventing one."

  staleness:
    snapshot_warn_days: 7      # /canvas-health flags snapshots >7d old as warning
    snapshot_critical_days: 30 # >30d old is critical for L0/L1/L2/L5
    adapter_regenerate_days: 180  # adapter's last_known_working >180d triggers regeneration nudge

# ============================================================
# Action flags in evidence entries
# ============================================================
# Canvas evidence entries often contain forward-looking observations
# ("candidate refresh", "worth considering", "next step", "should examine").
# These are signals, not commitments. A fresh agent (cross-session or
# non-Claude-Code) cannot tell whether a flagged item is open for action,
# on hold for evidence, or reserved for someone else.
#
# Convention: any forward-looking action statement in a canvas entry MUST
# end with an explicit status marker. Three states:
#
#   — OPEN. Any agent may action; evidence is sufficient.
#     Example: "Candidate positioning refresh — OPEN."
#
#   — ON HOLD (<reason>). Do NOT action; waiting for the named condition.
#     Example: "Candidate positioning refresh — ON HOLD (pending Juniors.dev
#     May 7 usage validation)."
#
#   — RESERVED (<who/when>). Do NOT action; assigned.
#     Example: "Candidate positioning refresh — RESERVED for /diamond-progress
#     at next L0 pivot review."
#
# Default for unmarked entries: pre-existing entries without explicit markers
# are treated as ON HOLD by convention. An agent that wants to action an
# unmarked flagged item must first either (a) get explicit user authorization,
# or (b) add the appropriate marker after determining state from context.
#
# Detection: prose containing any of these triggers the marker requirement —
#   candidate, worth considering, worth examining, should consider,
#   should examine, next step, future, refresh, revisit, reconsider
#
# Why this convention exists:
# Surfaced 2026-05-03 by blind-subagent assumption test on AGENTS.md design.
# A non-Claude-Code subagent could not distinguish flagged-but-pending items
# from open items and asked rather than guessing — exactly the failure mode
# this convention prevents. Preserves cross-session collaboration etiquette
# without a schema change. Compatible with existing entries — markers are
# added going forward; unmarked legacy entries default to ON HOLD.

action_flags:
  markers:
    - status: OPEN
      meaning: "Any agent may action; evidence is sufficient."
      requires_parenthetical: false
    - status: ON HOLD
      meaning: "Do not action; waiting for the named condition."
      requires_parenthetical: true   # the reason
    - status: RESERVED
      meaning: "Do not action; assigned to a named session/person/trigger."
      requires_parenthetical: true   # who/when
  default_for_unmarked: ON HOLD
  detection_keywords:
    - candidate
    - worth considering
    - worth examining
    - should consider
    - should examine
    - next step
    - future
    - refresh
    - revisit
    - reconsider

  # Transition rules — what happens when an ON HOLD or RESERVED condition is met.
  # Surfaced 2026-05-03 by /framework-health step 2b re-run of the AGENTS.md
  # router-discipline scenario: the convention defined markers but didn't define
  # how items LEAVE the held state. Boundary case: when (e.g.) Juniors.dev May 7
  # validation arrives, who removes the ON HOLD, what does it transition to,
  # and how is the transition audited?
  transitions:
    on_hold_condition_met:
      who_may_remove: "Any agent that can verify the named condition has been met. The verification must be evidenced (canvas evidence entry, decision-log line, or commit reference) — do not remove based on inference."
      transitions_to: "OPEN by default. EXCEPTION: if the original ON HOLD reason names a successor (e.g., 'ON HOLD pending X — then run /retrospective'), transition to RESERVED for that successor instead."
      audit_trail: |
        Required:
        1. Append a transition note to the entry's marker, preserving the original
           reason: "ON HOLD (pending X) → OPEN 2026-MM-DD (X confirmed via evidence Y)".
        2. Decision-log entry per G-P4 naming the entry, the verifying evidence,
           and the new state.
        3. If transitioning to RESERVED, name the successor explicitly.
    reserved_assignment_complete:
      who_may_remove: "The agent or person named as the assignee, OR any agent after the assignee has logged completion in decision-log.md."
      transitions_to: "OPEN if the underlying observation/decision is open to further action; otherwise leave as completed history (no state change — the action it was reserved for is done, the entry becomes a permanent observation)."
      audit_trail: "Same as on_hold_condition_met. Decision-log entry naming completion is required."
    timeout_handling:
      description: "ON HOLD entries with calendar conditions (e.g., 'pending May 7 evidence') that pass their named date without resolution should be flagged, not silently expired."
      when_date_passes: "Surface as a stale flagged item via /canvas-health (existing staleness machinery applies). Do NOT auto-transition to OPEN — the absence of the awaited evidence is itself a finding worth surfacing to the user."
      escalation: "After 30 days past a named date with no resolution, suggest re-evaluating whether the condition is still relevant or whether the underlying assumption has changed."

  # Concurrency note: transitions are intentionally idempotent. If two agents
  # observe the same condition met simultaneously and both attempt to transition
  # OPEN, the result converges (final state: OPEN, transition note appended
  # twice but preserved). Last-writer-wins on the marker; both audit-trail
  # entries survive. This trades a small amount of duplication for safety.

# Learning-target coupling — close the gap between "we have open questions on the
# canvas" and "we remembered to ask them when feedback was on offer."
# Graduated 2026-05-29 from a lived instance: cohort first-runs produced rich
# friction logs, but the canvas carried open positioning/hypothesis gaps
# (purpose.yml ON HOLD + RE-GATED entries, an in-progress human-task) that the
# feedback never targeted — so we learned what we happened to observe, not what
# we needed to learn. The fix is to derive feedback questions FROM the open gaps,
# rather than hoping post-hoc observation covers them.
#
# An "open learning need" is any canvas entry that is explicitly waiting on
# evidence to move:
#   - action_flags markers: ON HOLD (pending X), RESERVED, or RE-GATED entries
#   - purpose.yml / opportunities.yml entries with confidence < threshold and an
#     un-validated assumption named in the entry
#   - human-tasks.yml tasks with status in_progress whose success_criteria name
#     a MISSING SIGNAL track
#   - assumptions with validated: false carrying confidence > 0.5 (stakeholder
#     belief not yet externally checked)
learning_target_coupling:
  principle: |
    When a feedback-gathering activity is being designed (an interview, an
    assumption test, a cohort task, a survey), seed AT LEAST ONE question per
    relevant open learning need — so the feedback returns answers the canvas is
    actually waiting on, not only whatever the respondent volunteers.
    Feedback capacity is scarce and non-repeating; an un-targeted session spends
    it without retiring any open gap.
  question_tag:
    format: "[target → <canvas-file>#<entry-or-anchor>]"
    purpose: |
      Each seeded question carries an inline tag naming the canvas gap it feeds.
      Makes the coupling grep-detectable (canvas-health can verify a feedback
      task references ≥1 open gap) and lets /log-evidence route the answer back
      to the exact entry that was waiting (close-the-loop).
    examples:
      - "[positioning resonance → purpose.yml#L797-cutler] When you'd describe this to a peer, what words do you use?"
      - "[L4 code-quality gap → purpose.yml#L828-1] After your build shipped, did anything break that a review gate should have caught?"
      - "[theory-fluency hypothesis → purpose.yml#anti_states] Did the vocabulary feel like scaffolding or like a wall?"
  applies_to_skills:
    - /mycelium:user-interview
    - /mycelium:assumption-test
    - /mycelium:mocked-persona-interview
    # human-task feedback design (human-tasks.yml#key_questions) follows the same rule
  not_a_gate: |
    NUDGE-tier. A feedback session that targets zero open gaps is allowed (some
    sessions are pure discovery) — but canvas-health surfaces it so the omission
    is a choice, not an oversight. The convention asks you to seed the question,
    not to guarantee an answer.
  close_the_loop: |
    /mycelium:log-evidence reads the [target → ref] tag on an answered question
    and routes the captured evidence to that canvas entry, then prompts whether
    the open gap can now transition (ON HOLD → OPEN, RE-GATED → met, confidence
    bump). Logging the evidence and retiring the gap remain separate steps; the
    tag makes the second step visible.
