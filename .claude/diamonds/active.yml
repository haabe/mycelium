# Mycelium Active Diamonds
# Tracks all currently active diamonds across all scales.
# Updated by /diamond-progress and /diamond-assess skills.

# Diamonds are created when:
# - /interview completes (creates L0)
# - A parent diamond spawns a child (e.g., L0 -> L1)
# - A user explicitly starts a new diamond

active_diamonds: []
# Each diamond entry:
# - id: unique identifier (e.g., "l0-purpose", "l2-opportunity-search-ux")
# - scale: L0|L1|L2|L3|L4|L5
# - phase: discover|define|develop|deliver
# - name: human-readable name
# - parent_id: null for L0, parent diamond id otherwise
# - confidence: 0.0-1.0
# - evidence_type: speculation|anecdotal|data-supported|test-validated|launch-validated
# - cynefin_domain: clear|complicated|complex|chaotic|confused
# - canvas_refs: list of canvas files this diamond reads/writes
# - created_at: ISO timestamp
# - last_progressed: ISO timestamp
# - theory_gates_status: map of gate name -> pass|fail|not-checked
# - notes: free text
# - product_type: software|content_course|content_publication|content_media|ai_tool|service_offering (v0.11.0, per-diamond)
#
# Root-level fields (set during /interview Phase 6):
# - project_type: solo_hobby|solo_product|team_startup|team_enterprise
# - dogfood: true|false
#
# Note (v0.11.0): product_type is PER-DIAMOND, not root-level. A session can have
# multiple diamonds with different product types (e.g., software tool + course).
# project_type and dogfood remain root-level because they describe the team/context,
# not the deliverable. Child diamonds inherit product_type from their parent unless
# explicitly overridden.

last_updated: null
