# Mycelium File Manifest
# Classifies every file as framework (safe to replace) or project state (never overwrite).
# Used by .claude/scripts/upgrade.sh to perform safe upgrades.

# Framework files — always replaced during upgrade.
# These contain Mycelium instructions, not project data.
framework:
  top_level:
    - CLAUDE.md
    - README.md
    - CONTRIBUTORS.md
    - LICENSE
    - requirements-ci.txt
  directories:
    - .claude/engine/
    - .claude/skills/
    - .claude/hooks/
    - .claude/domains/
    - .claude/orchestration/
    - .claude/schemas/
    - .claude/scripts/
    - .claude/optimization/
    - .claude/tests/
    - .claude/auto-dogfood/
    - .github/
    # .claude/jit-tooling/ is MIXED (see metrics_adapters section below).
    # upgrade.sh preserves active-metrics.yml and user-generated adapters
    # while replacing the framework-shipped files.
  single_files:
    - .claude/settings.json
    - .claude/manifest.yml

# Harness files — framework templates that coexist with project data.
# Replace framework files, preserve project data files.
harness_framework:
  - .claude/harness/anti-patterns.md
  - .claude/harness/cognitive-biases.md
  - .claude/harness/engineering-principles.md
  - .claude/harness/guardrails.md
  - .claude/harness/guardrails-core.md
  - .claude/harness/guardrails-delivery.md
  - .claude/harness/guardrails-discovery.md
  - .claude/harness/guardrails-index.md
  - .claude/harness/guardrails-market.md
  - .claude/harness/README.md
  - .claude/harness/security-trust.md
  - .claude/harness/theory-tensions.md

# READMEs in preserved directories — framework documentation that lives
# alongside project state. Always replaced during upgrade, even though the
# parent directory is preserved.
preserved_dir_readmes:
  - .claude/canvas/README.md
  - .claude/diamonds/README.md
  - .claude/memory/README.md
  - .claude/evals/README.md
  - .claude/evals/dogfood-reports/README.md
  - .claude/tests/README.md

# Project state — NEVER overwrite if they exist.
# These contain the user's work product.
project_state:
  - .claude/harness/decision-log.md
  - .claude/diamonds/active.yml
  - .claude/memory/
  - .claude/state/
  - .claude/settings.local.json

# Canvas templates — add new files only, NEVER overwrite existing.
# Existing files contain populated project data.
canvas_templates:
  - .claude/canvas/*.yml

# Evals — mixed. Framework scenarios are replaced, but project-specific
# dogfood reports and results are preserved.
evals:
  replace:
    - .claude/evals/scenarios/
  preserve:
    - .claude/evals/dogfood-reports/
    - .claude/evals/results/
    - .claude/evals/metrics/          # v0.14: per-project metric snapshots

# Metrics adapters (v0.14) — mixed.
# Framework ships TEMPLATE.md, GENERATING.md, and github.md as the reference
# adapter. All other adapters are generated per-project and must be preserved
# across upgrades.
metrics_adapters:
  framework:
    - .claude/jit-tooling/metrics-adapters/TEMPLATE.md
    - .claude/jit-tooling/metrics-adapters/GENERATING.md
    - .claude/jit-tooling/metrics-adapters/github.md
  project_state:
    - .claude/jit-tooling/active-metrics.yml
    - .claude/jit-tooling/metrics-adapters/  # any non-framework adapter files
