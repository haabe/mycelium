  diamonds/active.yml: |
    active_diamonds:
      - id: d-sh-001
        scale: L0
        phase: complete
        product_type: software
        project_type: solo_product
        confidence: 0.7
      - id: d-sh-004
        scale: L4
        phase: deliver
