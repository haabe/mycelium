  harness/decision-log.md: |
    # Decision Log
  memory/corrections.md: |
    # Corrections
    No corrections logged yet.
  memory/patterns.md: |
    # Patterns
    No patterns logged yet.

planted_failures: []

journey:
  - skill: retrospective
  - skill: diamond-progress
  - skill: diamond-assess

success_criteria:
  # Retrospective captures learnings
  - canvas_populated: [memory/corrections.md]

  # CRITICAL: cycle-history.yml gets a record
  - canvas_evidence_type:
      file: cycle-history.yml
      has_cycle_entry: true

  # Cycle record has predicted vs actual
  - decision_log_contains: ["cycle", "predicted", "actual"]

  # Effort delta noted (predicted 5 days, actual 7 days)
  - decision_log_contains: ["effort", "underestimate"]

  # Diamond progresses to complete
  - diamond_created: {scale: L4, phase: complete}

  # Decision logged
  - decision_log_honest: true

  # Hook correctness
  - hooks_no_errors: true

budget:
  max_rounds: 12
  max_time_seconds: 1500
  model_overrides:
    mycelium_agent: sonnet
    user_simulator: haiku
