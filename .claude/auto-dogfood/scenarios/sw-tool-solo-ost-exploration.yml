name: "Developer search tool — solo_product — OST exploration with ICE scoring"
category: dogfood
type: full-session
difficulty: hard

product:
  name: "Findly"
  type: software
  description: |
    A local code search tool that indexes your projects and lets you search
    across all of them from a single CLI. Combines ripgrep speed with
    semantic understanding — search by concept ("error handling in auth"),
    not just text matching. Runs entirely local, no cloud.
  pitch: |
    I have 40+ repos on my machine. When I want to find how I solved a
    problem before, I have to remember WHICH repo it was in, then grep
    through it. I want a tool that indexes all my code and lets me search
    across everything — both text search (fast, exact) and semantic search
    (slower, concept-level). Think "ripgrep meets local embeddings."

persona:
  name: "Kai"
  role: "Staff engineer, 12 years experience, building this as a side project"
  style: "Analytical, evidence-driven, values structured exploration over gut instinct"
  knowledge: "Deep systems programming in Rust, familiar with embedding models, has built CLI tools professionally"
  answers:
    purpose: |
      The problem is fragmented code knowledge. I've written solutions to
      hundreds of problems across dozens of projects over the years. But
      when I face a similar problem again, I can't find my own past work.
      Browser history is useless for code. GitHub search is repo-scoped.
      IDE search is workspace-scoped. I need cross-repo search that
      understands code, not just text.
    users: |
      Senior developers with large local codebases — 20+ repos. People
      who've been coding for 5+ years and have significant accumulated
      knowledge in their own code. Initially targeting Rust and Go devs
      because they tend to have many small projects vs monorepos. Maybe
      200-500 potential early users in my extended network.
    north_star: |
      Searches that return a useful result. If someone searches and
      clicks through to the result, it was useful. If they refine the
      query or give up, it wasn't. "Search success rate" — percentage
      of searches that end with the user opening a found file.
    landscape: |
      ripgrep is fast text search but single-directory. Sourcegraph does
      cross-repo search but it's cloud-hosted and enterprise-priced.
      GitHub code search is limited to GitHub repos. Hound by Etsy is
      self-hosted but web-only and text-only. Semantic code search exists
      in research but no good CLI tool yet. My differentiation is local +
      semantic + CLI + fast.
    current_state: |
      I have a working prototype of the text search part — it indexes
      repos and searches across them using ripgrep as a backend. The
      semantic search part is experimental — I've tried sentence-transformers
      but the quality for code is mediocre. I need to figure out: is the
      text search enough on its own, or do users actually need semantic?

project_type: solo_product
dogfood: true

