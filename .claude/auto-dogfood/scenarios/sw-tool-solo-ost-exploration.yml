planted_failures:
  - type: feasibility-risk
    trigger: assumption-test
    description: |
      The assumption test reveals that semantic search quality for code
      is NOT good enough with current local models. Test results:
      - sentence-transformers/all-MiniLM-L6: 23% precision on code queries
      - CodeBERT: 41% precision but 8x slower indexing
      - Baseline text search (ripgrep): 67% precision on exact matches
      Conclusion: semantic search adds marginal value over good text search
      with fuzzy matching. The feasibility assumption fails.
    personas_rejecting: []

journey:
  - skill: ost-builder
  - skill: ice-score
  - skill: assumption-test
    planted_failure: feasibility-risk
  - skill: diamond-assess

success_criteria:
  - canvas_populated: [opportunities.yml]
  - ost_has_solutions: {min_solutions: 2}
  - ice_scores_present: true
  - assumption_test_has_prediction: true
  - confidence_reflects_test: true
  - decision_log_contains: ["feasibility", "assumption", "risk"]
  - decision_log_honest: true
  - diamond_not_advanced: true
  - hooks_no_errors: true

budget:
  max_rounds: 15
  max_time_seconds: 1800
  model_overrides:
    mycelium_agent: sonnet
    user_simulator: haiku
