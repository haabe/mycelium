planted_failures:
  - type: security-vulnerability
    trigger: reflexion
    description: |
      The initial implementation has a security vulnerability: it does NOT
      validate URL schemes before shortening. An attacker could shorten
      "javascript:alert(document.cookie)" or "data:text/html,<script>..."
      and the Resolve() method would return the malicious URL. The reflexion
      loop must catch this during validation — the OWASP input validation
      check should flag unvalidated URL schemes as a security issue.
    personas_rejecting: []
  - type: missing-tests
    trigger: delivery-bootstrap
    description: |
      The code is written without tests. The delivery bootstrap should
      detect Go as the language, check for *_test.go files, find none,
      and flag this as a quality gap. G-V7 (tests alongside code) should
      block delivery completion.
    personas_rejecting: []

journey:
  - skill: delivery-bootstrap
  - skill: reflexion
    planted_failure: security-vulnerability
  - skill: dora-check
  - skill: retrospective

success_criteria:
  - canvas_populated: [threat-model.yml]
  - code_files_written: {pattern: "*.go", min_count: 1}
  - test_files_written: {pattern: "*_test.go", min_count: 1}
  - reflexion_iterated: {min_iterations: 2}
  - security_issue_caught: true
  - corrections_logged: true
  - dora_logged: true
  - decision_log_contains: ["security", "validation", "url", "reflexion"]
  - decision_log_honest: true
  - hooks_no_errors: true

budget:
