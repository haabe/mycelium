name: "URL shortener library — solo_product — coding quality with self-learning"
category: dogfood
type: full-session
difficulty: hard

product:
  name: "Shrink"
  type: software
  description: |
    A small Go library for URL shortening with pluggable storage backends.
    Provides a clean API: Shorten(url) -> shortCode, Resolve(shortCode) -> url.
    Supports in-memory, SQLite, and Redis backends. Designed to be embedded
    in other Go services, not a standalone service.
  pitch: |
    I want to build a Go library for URL shortening that other Go services
    can import. Clean API, pluggable storage, well-tested. I've seen too
    many URL shorteners that are full web apps — I just want the core logic
    as a library I can embed in my API server.

persona:
  name: "Ren"
  role: "Backend engineer, 5 years Go experience, building this as an open-source library"
  style: "Quality-focused, believes in testing, reads standard library source code for style guidance"
  knowledge: "Proficient in Go, familiar with table-driven tests, benchmarks, and Go module conventions"
  answers:
    purpose: |
      Every time I need URL shortening in a project, I either pull in a
      heavy dependency or write a quick-and-dirty implementation. I want
      a well-tested, minimal library that handles the boring stuff —
      collision detection, configurable code length, pluggable storage —
      so I can focus on my actual application logic.
    users: |
      Go developers who need URL shortening as a library, not a service.
      Probably 50-100 people who would star it on GitHub if it's good.
      The kind of dev who reads the source before importing a dependency.
    north_star: |
      GitHub stars are vanity. Real metric: imports. How many Go modules
      list this as a dependency? Check via pkg.go.dev import count.
      Secondary: issues filed (people care enough to report bugs = real usage).
    landscape: |
      Several Go URL shortener repos on GitHub but they're all full web
      apps with databases and HTTP handlers baked in. No clean library-only
      option. Python has pyshorteners. Node has shortid (different thing).
      The gap is a well-designed Go library.
    current_state: |
      I have a design doc with the API surface. The core interface is
      Shortener with Shorten() and Resolve() methods. Storage is a
      pluggable interface. No code written yet — I want to make sure
      the design is right before coding.

project_type: solo_product
dogfood: true

