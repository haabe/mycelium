name: "SaaS analytics platform — solo_product — L1 strategy with Wardley mapping"
category: dogfood
type: full-session
difficulty: hard

product:
  name: "Metriq"
  type: software
  description: |
    A lightweight analytics platform for indie SaaS founders. Tracks key
    metrics (MRR, churn, LTV) from Stripe webhooks. Self-hosted, privacy-first
    alternative to Baremetrics/ChartMogul. Single Docker container deployment.
  pitch: |
    I'm an indie SaaS founder running 3 small products. I need to know my
    MRR, churn, and LTV without sending my Stripe data to a third party.
    I want something I can self-host, that just reads Stripe webhooks and
    gives me a clean dashboard. No tracking pixels, no user analytics —
    just my business metrics.

persona:
  name: "Sven"
  role: "Indie SaaS founder, 4 years solo bootstrapping"
  style: "Strategic thinker, methodical, values long-term sustainability over speed"
  knowledge: "Full-stack developer, runs 3 SaaS products (combined $8k MRR), familiar with competitive landscape"
  answers:
    purpose: |
      My Stripe data is my most sensitive business data. I don't want to
      send it to Baremetrics or ChartMogul. I need MRR, churn, and LTV
      calculated correctly from raw webhook events. Self-hosted in my
      existing Docker infrastructure.
    users: |
      Indie SaaS founders and small bootstrapped teams who care about
      data sovereignty. Maybe 500-1000 potential users in the indie maker
      community. They already have Stripe, Docker, and basic DevOps skills.
    north_star: |
      Active self-hosted instances. If people deploy and keep using it
      month over month, we're providing value. Secondary: time from
      Stripe event to dashboard update (latency).
    landscape: |
      Baremetrics ($108/mo), ChartMogul ($99/mo), ProfitWell (free but
      acquired by Paddle), Stripe's built-in analytics (basic).
      Differentiator: self-hosted, open source, zero data sharing.
      Risk: Stripe improves their built-in analytics enough.
    current_state: |
      I have a prototype that reads Stripe webhooks and stores events in
      SQLite. No dashboard yet. No churn calculation. Just raw event
      storage. I've validated the idea in 2 indie maker communities —
      about 30 people expressed interest.

project_type: solo_product
dogfood: true

