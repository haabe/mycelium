name: "Markdown link checker — solo_hobby — happy path full flow"
category: dogfood
type: full-session
difficulty: medium

product:
  name: "Linkrot"
  type: software
  description: |
    A CLI tool that scans markdown files for broken links. Reads .md files,
    extracts URLs, checks them with HEAD requests, and reports dead links.
    Simple, fast, no dependencies beyond the standard library.
  pitch: |
    I maintain several open-source repos with docs. Links rot. I want a
    fast CLI that scans my markdown files and tells me which links are
    broken. Just "linkrot check docs/" and it tells me what's dead. No
    config files, no plugins, just works.

persona:
  name: "Pat"
  role: "Open-source maintainer, hobby developer"
  style: "Practical, hates over-engineering, just wants things that work"
  knowledge: "3 years Python, maintains 4 small open-source repos, comfortable with CLI tools"
  answers:
    purpose: |
      My READMEs and docs have broken links. I don't notice until someone
      files an issue. It's embarrassing. I want to catch broken links
      before they embarrass me. A CI-friendly CLI that exits non-zero
      when links are broken would be perfect.
    users: |
      Open-source maintainers with documentation. People who write READMEs,
      contribution guides, and wikis. Probably use it in CI/CD pipelines.
      Just me at first, then maybe 10-20 people in my OSS circle.
    north_star: |
      Broken links caught before merge. If the tool catches a broken link
      in CI before it ships, that's the value. "Links caught" — broken
      links detected per run that were previously unnoticed.
    landscape: |
      markdown-link-check (Node, popular but slow for large repos). lychee
      (Rust, very fast, feature-rich). broken-link-checker (various).
      My angle: Python, zero deps, dead simple, opinionated defaults.
      Not trying to compete on features — just the simplest possible tool.
    current_state: |
      I have a 20-line prototype that uses requests + re.findall to extract
      and check URLs from a single file. Works but doesn't handle relative
      links, anchors, or rate limiting. I want to do this properly.

project_type: solo_hobby
dogfood: true

