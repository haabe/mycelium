planted_failures:
  - type: bvssh-failing
    trigger: bvssh-check
    description: |
      The "Happier" dimension is failing:
      - Solo founder working 60+ hour weeks for 3 months straight
      - No vacation since launch. Sleep quality declining.
      - Technical debt accumulating (test coverage at 45%, should be 80%+)
      - No on-call rotation — Rosa is the single point of failure
      - If Rosa burns out or gets sick, the 12 paying customers have zero support
      This is a sustainability risk that BLOCKS v1.0 GA.

