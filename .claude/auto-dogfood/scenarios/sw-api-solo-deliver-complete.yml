name: "REST API service — solo_product — deliver-to-complete gate validation"
category: dogfood
type: full-session
difficulty: hard

product:
  name: "Billable"
  type: software
  description: |
    A REST API for usage-based billing. Tracks API calls, storage, and
    compute usage per customer. Integrates with Stripe for invoicing.
    Designed for SaaS platforms that need metered billing.
  pitch: |
    My SaaS charges per API call. I built a billing service that tracks
    usage and syncs to Stripe. It's been running in production for 3
    months with 12 customers. I need to formally validate it's ready
    for general availability — security, quality, sustainability.

persona:
  name: "Rosa"
  role: "Backend engineer, 6 years experience, solo founder"
  style: "Quality-focused, security-conscious, prefers thorough over fast"
  knowledge: "Go/Rust, distributed systems, Stripe API, 3 months production experience with this product"
  answers:
    purpose: |
      SaaS platforms need metered billing but building it is complex.
      Stripe handles payments but not usage tracking. My API sits between
      the app and Stripe — it meters usage, calculates invoices, and
      pushes them to Stripe. 12 paying customers, $2.4k MRR.
    users: |
      SaaS founders and small platform teams who need usage-based billing.
      They have engineering teams of 2-10. They already use Stripe.
      They don't want to build billing infrastructure from scratch.
    north_star: |
      Invoices processed correctly. If our usage tracking matches what
      Stripe charges and customers don't dispute, we're working. Zero
      billing errors is the goal.
    landscape: |
      Stripe Billing (basic metering), Lago (open-source, complex), Metronome
      (enterprise, expensive), Orb (YC-backed, API-first). Our angle: simpler
      than Lago, cheaper than Metronome, more mature than DIY.
    current_state: |
      Production for 3 months. 12 customers. Processing ~2M events/month.
      One billing error found and fixed (timezone edge case). Go codebase,
      PostgreSQL, deployed on Fly.io. Need to formalize DoD and ship v1.0.

project_type: solo_product
dogfood: true

