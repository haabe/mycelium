        - id: S4
          name: "v1.0 GA release"
          status: in-progress
  memory/corrections.md: |
    # Corrections

    ### Timezone billing boundary error
    **Mistake**: Used local timezone for billing period boundaries, causing events near midnight to land in wrong billing period.
    **Correction**: Normalize all timestamps to UTC. Use inclusive-exclusive ranges [start, end) for billing windows.
    **Prevention**: Always use UTC internally. Add timezone boundary tests.

    ### Missing idempotency on event ingestion
    **Mistake**: Early version allowed duplicate events if client retried. Led to inflated usage counts.
    **Correction**: Added dedup_key to event schema. Server rejects duplicates within 24h window.
    **Prevention**: All mutable endpoints must be idempotent by design.

    ### Unscoped API key permissions
    **Mistake**: Initial API keys had full access. Customer accidentally exposed key; could read other customers' usage.
    **Correction**: Scoped keys to customer_id. Added rate limiting. Implemented key rotation.
    **Prevention**: Least privilege from day one. Scope all credentials.
