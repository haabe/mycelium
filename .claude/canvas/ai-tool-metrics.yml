# AI Tool Delivery Metrics
# For AI-powered products: prompt libraries, agents, fine-tuned models, workflow automation
# Measures prompt quality, safety, and regulatory compliance rather than deployment frequency.
#
# Product type: ai_tool

schema_version: 1

# ============================================================
# Prompt / Model Quality
# ============================================================
prompt_quality:
  evaluation_method: null    # manual, automated eval, LLM-as-judge, human rater panel
  accuracy_score: null       # % of outputs meeting quality criteria
  consistency_score: null    # same input -> similar outputs (measure of variance)
  safety_score: null         # % of adversarial inputs handled correctly (red-team results)
  last_evaluated: null

# ============================================================
# Behavioral Constraints (must-never rules)
# ============================================================
# What the system must NEVER do, independent of what a user asks for. This is
# the "behavioral contract" section of an AI PRD: hyperspecific prohibitions,
# not vague guidance. "Must not cite a source absent from retrieved context"
# beats "be accurate". Each constraint is binary-checkable and is verified at
# Definition of Done (see /mycelium:definition-of-done — ai_tool section).
behavioral_constraints: []
  # - id: bc-1
  #   rule: "Must not cite a source absent from the retrieved context."
  #   scope: all_outputs          # all_outputs | tool_calls | <named surface>
  #   verification: null          # how non-violation is checked (eval probe / manual review / guardrail)
  #   last_verified: null

# ============================================================
# Failure Modes (evidence-derived, from real outputs)
# ============================================================
# DERIVE these from reviewing real prototype outputs, NOT from imagination —
# people articulate requirements far better from seeing outputs than from
# abstract thinking (criteria drift). Review the outputs BEFORE writing
# acceptance criteria. Each mode carries a BINARY pass/fail acceptance_criterion
# so "accurate enough" never stays a subjective Likert judgment, and names who
# holds final judgment. severity is by failure COST, not occurrence rate (a rare
# fabricated citation can outweigh a common formatting slip).
failure_modes:
  outputs_reviewed: null         # N real outputs inspected to derive this list (target >= 20)
  review_source: null            # where they came from (prototype / staging / A-B / dogfood)
  last_reviewed: null
  modes: []
    # - id: fm-1
    #   description: "Summary invents action items the meeting never produced."
    #   frequency: null           # observed rate across reviewed outputs
    #   severity: null            # low | medium | high — by failure COST
    #   acceptance_criterion: null  # BINARY + owner: ">= 95% of summaries contain zero fabricated action items; PM holds final judgment"

# ============================================================
# Model Metrics (if fine-tuned or custom model)
# ============================================================
model_metrics:
  model_id: null             # e.g., "claude-sonnet-4-5-20250514", "gpt-4o", custom model ID
  version: null              # prompt version or model version
  training_data_provenance: null  # where training data came from, consent status
  bias_assessment: null      # results of bias testing (demographic, cultural, etc.)
  last_assessed: null

# ============================================================
# Deployment & Versioning
# ============================================================
deployment:
  method: null               # API, embedded, agent framework, manual copy-paste, marketplace
  versioning: null           # how prompt/model versions are tracked (git, registry, manual)
  rollback_capability: false # can you revert to a previous prompt/model version?

# ============================================================
# Time to First Value (TTFV)
# ============================================================
# How quickly a user gets useful output after first accessing the tool.
# For AI tools: time from signup/install to first successful task completion.
time_to_first_value:
  current: null              # e.g., "30 seconds" (paste prompt, get result), "5 minutes" (configure + first run)
  target: null
  bottleneck: null           # e.g., "API key setup", "onboarding flow", "first prompt guidance"

# ============================================================
# Usage & Retention (customer-side)
# ============================================================
usage:
  daily_active_users: null   # DAU (if applicable)
  task_success_rate: null    # % of user tasks that produce a satisfactory result
  retention_rate: null       # % of users who return after first use (7-day, 30-day)
  drop_off_points: []        # where users abandon (e.g., "onboarding", "first complex prompt", "pricing wall")

# ============================================================
# Revenue & Retention (business health)
# ============================================================
revenue:
  refund_rate: null           # % of purchases refunded. Target: < 5%.
  customer_lifetime_value: null
  churn_rate: null            # for subscriptions: % who cancel per period
  net_revenue_retention: null # target: > 100%

# ============================================================
# Regulatory Compliance (EU AI Act + applicable regulation)
# ============================================================
regulatory:
  eu_ai_act_risk_level: null         # minimal|limited|high|unacceptable
  transparency_disclosure: false     # Article 50: users know they're interacting with AI
  human_oversight_mechanism: null    # how humans can intervene in AI decisions
  data_protection_assessment: false  # DPIA completed if processing personal data

last_measured: null
