# Anti-patterns from Smart (BVSSH):
# MORF = "Measures of Random Functioning" -- tracking metrics that don't connect to
# actual outcomes (e.g., story points, velocity, lines of code). Replace with
# outcome metrics that connect to BVSSH dimensions.
# Other anti-patterns: Big-bang transformations, mandating one framework,
# focusing on output velocity over outcome value, reorganizing without
# changing ways of working.
