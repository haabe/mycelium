# Opportunity Solution Tree Canvas — Teresa Torres
# Source: "Continuous Discovery Habits"
# Populated through: /ost-builder skill
# Schema: .claude/schemas/canvas/opportunities.schema.json
# Validation: each opportunity entry MUST include provenance (v0.9.0)

schema_version: 1

# Root: The desired outcome (from North Star input metrics)
# VALIDATION: desired_outcome.metric MUST reference a specific input metric
# from canvas/north-star.yml#input_metrics. If it doesn't match any, either:
#   1. Add the metric to north-star.yml first, or
#   2. Document why this OST targets an outcome outside the North Star model.
# This ensures every OST tree is connected to the product's core value model.
desired_outcome:
  metric: ""  # Which input metric this tree targets (must match north-star.yml)
  north_star_input_ref: ""  # Exact name from north-star.yml#input_metrics
  current_value: null
  target_value: null

# Opportunities: Customer needs/pain points discovered through research
# Structure is a tree: opportunities can have sub-opportunities
# REQUIRED for each entry: name, provenance
opportunities:
  # First-run friction cluster surfaced 2026-05-13 from a private first-run
  # observation (N=1 cautious-learner, behavior_validated per friction
  # item). Each entry below carries the user's specific instance + a
  # framework-recurrence audit showing where the same pattern appears
  # elsewhere in the codebase. Evidence is generically framed per
  # source's disclosure-and-ack on 2026-05-13; identity withheld
  # pending separate sign-off for receipts attribution.

  - id: opp-001
    name: "Status-count hooks display '0 X' as ambiguous between success and failure"
    description: |
      A first-run user ran `/reload-plugins` and saw the platform report
      "0 skills"; the user could not tell whether install had succeeded
      with legitimately-zero-skills or failed to count. Probed `/myc`
      autocomplete to confirm install. Outcome was correct, but the
      bridge-of-doubt cost real time and confidence.

      The `/reload-plugins` output itself is Claude Code (out of scope
      for this entry), but the same "0 X" ambiguity pattern recurs in
      Mycelium-owned status hooks:
        - `plugins/mycelium/hooks/preflight.sh:36` — "Mycelium preflight
          complete. $CORRECTIONS_COUNT corrections in memory." When
          $CORRECTIONS_COUNT=0 (true on every fresh install), the line
          reads as much like a counter-failure as a healthy zero.
        - `plugins/mycelium/hooks/stop-check.sh` — "Session ended.
          0 corrections, 0 decisions logged." between every interview
          turn (also feeds opp-003).
        - `plugins/mycelium/hooks/session-start.sh:325` — similar count
          line.

      Pattern: count-display lines do not distinguish "genuinely zero
      (healthy)" from "could not count (failure)". A user who has not
      yet built mental model of what these counts mean cannot read the
      output as feedback.

      Candidate fixes (not ranked):
        1. Show "0/N corrections (no activity recorded yet)" instead of
           bare "0 corrections" on fresh install.
        2. Suppress count line entirely when count=0 and the
           memory file existed pre-hook (genuinely empty), keep when
           count=0 but file is missing (genuine failure).
        3. Replace numeric lines with status-shape language ("memory:
           empty (fresh install)" vs "memory: 12 corrections logged").

      **Status 2026-05-13 — SHIPPED (partial)**: candidate fixes #1+#3
      applied to `preflight.sh` (three-state messaging: not initialized
      vs empty vs N corrections) and `session-start.sh` (empty-state
      phrased as "no corrections logged yet"). `stop-check.sh` covered
      under opp-003. Pattern still open for any future hook that emits
      bare "0 X" counts; treat opp-001 as the precedent.
    type: functional
    frequency: high       # Every fresh install hits this; every hook firing thereafter shows the count
    impact: low           # Cosmetic + onboarding-trust, not blocking
    strategic_alignment: medium  # Onboarding-trust gate is L1-thesis-relevant
    cynefin_domain: clear  # Display logic, deterministic, single-file fixes
    sub_opportunities: []
    solutions: []
    provenance:
      evidence_type: anecdotal  # N=1 behavior_validated for /reload-plugins instance; recurrence pattern desk-confirmed via grep across hook files
      evidence_sources:
        - "private first-run observation 2026-05-10 (generic, source disclosure ack'd 2026-05-13)"
        - "plugins/mycelium/hooks/preflight.sh"
        - "plugins/mycelium/hooks/stop-check.sh"
        - "plugins/mycelium/hooks/session-start.sh"
      captured_at: "2026-05-13"
      confidence: 0.4  # Single user instance + clear pattern match in three hook files; would advance with second user observation or one shipped fix observed-in-the-wild

  - id: opp-002
    name: "/interview skill: decisions asked too early, doc/skill consistency drift"
    description: |
      Two related frictions in `/mycelium:interview` and its companions
      that both stem from the same shape: skills ask the user for input
      or signal expectations without giving the user enough context to
      evaluate the choice. Bundled because a single skill-prompt audit
      would fix both.

      Instance A (decision-without-context): During `/mycelium:start`,
      the agent asked the first-run user whether to create AGENTS.md
      for cross-agent portability (Codex/Cursor/Aider/Copilot/Claude
      Code fallback). The user uses only Claude Code and accepted
      from "laziness" because they lacked basis to evaluate the
      implication. Decision was asked before user has framing to
      understand what AGENTS.md does, when it matters, or what cost
      defaulting-yes carries.

      Recurrence: the agent narrating diamond inspection asked "Want
      to fill those [project_type, product_type] in now, or leave them
      for `/mycelium:diamond-assess`?" — same shape, different field.
      Pattern likely repeats across skills that offer post-action
      decision branches. Cannot be exhaustively listed via grep; needs
      audit of every "Want to / Do you want / Should I" prompt across
      `plugins/mycelium/skills/`.

      Instance B (doc/skill consistency drift): User expected a
      time-budget question based on prior README reading; the question
      did not appear. `plugins/mycelium/skills/interview/SKILL.md:34`
      confirms the time-budget routing was intentionally REPLACED by
      the Universal Brief Flow ("Both were predict-the-future questions
      asked before any value was delivered"). However:
        - `plugins/mycelium/skills/preflight/SKILL.md:22-34` STILL uses
          "time budget" framing as an active part of the skill.
        - README references to time-budget flow (not audited here) may
          still exist and were the user's source for the expectation.

      The /interview change shipped without sweeping cross-skill /
      README references, leaving users with stale mental models that
      cost real cycles searching for the missing prompt.

      Candidate fixes:
        1. For Instance A: every "Want to / Do you want" prompt in
           skills gets a one-line framing of why the choice matters
           BEFORE the question, not after.
        2. For Instance B: README + cross-skill audit for residual
           time-budget references; either restore consistent
           terminology in /preflight or update /preflight to align
           with /interview's no-future-prediction stance.
        3. Long-term: when a skill significantly changes its prompt
           surface, a doc-sweep step in the release process catches
           cross-skill / README drift.

      **Status 2026-05-13 — SHIPPED (partial)**:
        - Instance A (decision-context): AGENTS.md prompt in
          `setup/SKILL.md:119` rewritten to give say-yes-vs-skip framing
          ("say yes if you use other agents; skip if Claude Code only").
          Sets the precedent. Pattern audit of remaining
          "Want to / Do you want" prompts across skills still pending.
        - Instance B (doc drift): `README.md:46` updated — old
          time-budget routing description replaced with Universal Brief
          Flow description. `/preflight` time-budget usage left
          unchanged (it's legitimate at delivery-scoping stage,
          different from /interview's removed brief-stage routing).
        - Remaining: full skill-prompt audit (Instance A pattern),
          release-process doc-sweep step (#3).
    type: functional
    frequency: high       # /interview is the primary entry point; every first-run hits it
    impact: medium        # Real time cost + correctness-of-mental-model risk
    strategic_alignment: high  # First-run skill design is L1-thesis-load-bearing
    cynefin_domain: complicated  # Known shapes, known countermeasures, requires audit + sweep
    sub_opportunities: []
    solutions: []
    provenance:
      evidence_type: anecdotal  # N=1 behavior_validated for both instances; recurrence pattern partially desk-confirmed
      evidence_sources:
        - "private first-run observation 2026-05-10 (generic, source disclosure ack'd 2026-05-13)"
        - "plugins/mycelium/skills/interview/SKILL.md:34 (time-budget removal)"
        - "plugins/mycelium/skills/preflight/SKILL.md:22-34 (residual time-budget framing)"
      captured_at: "2026-05-13"
      confidence: 0.4  # Two instances from one user + desk-confirmed cross-skill inconsistency; recurrence of decision-without-context shape needs broader skill-prompt audit before advancing

  - id: opp-003
    name: "Stop-hook output leaks into user-facing channel as visual noise"
    description: |
      First-run user reported that the line
      `Stop says: Session ended. 0 corrections, 0 decisions logged.`
      appeared between every interview question turn. The user read
      it as an error message; in practice the interview continued
      normally.
      Pattern: hook output that is operationally useful (recording
      session-end state) is rendered into the same channel as the
      agent's user-facing content, with no signal that it is mechanical
      output rather than conversational content.

      Source confirmed: `plugins/mycelium/hooks/stop-check.sh` is the
      single emitter; runs on every Stop event. The N=0 case (no
      corrections / no decisions during a brief flow) is the most
      common case during first-run, so the line appears at maximum
      frequency precisely when the user has the weakest model of what
      it means.

      Related but distinct shape: `session-start.sh:325` produces a
      similar reminders/corrections summary at session boundary; less
      noisy because it appears once per session, but the same
      output-channel-conflation pattern applies.

      Candidate fixes:
        1. Suppress when both counts are 0 AND session was brief-shaped
           (no agent-side activity to log) — silence is correct output
           for "nothing happened to log".
        2. Move hook output to a dedicated channel (system message,
           stderr-equivalent, ANSI-dim) so users can distinguish hook
           feedback from agent content.
        3. Rephrase from "Session ended. 0 corrections, 0 decisions
           logged." (reads as terminal report) to absence-shape
           ("memory unchanged this turn") that doesn't suggest a
           session-state event.

      **Status 2026-05-13 — SHIPPED**: candidate fix #1 + #3 applied to
      `stop-check.sh`. Hook now emits nothing when WARNINGS is empty
      AND both counts are zero (silence is correct output for
      no-activity). When counts > 0 without warnings, rephrased
      "Session ended." → "Session:" so the line reads as turn-summary
      not session-terminal. opp-003 closed.
    type: functional
    frequency: high       # Fires per Stop event; high frequency during /interview
    impact: medium        # Reads as error to first-time users; visual noise to repeat users
    strategic_alignment: medium  # Hook-output discipline is part of the perceived-cognitive-load surface
    cynefin_domain: clear  # Single file, mechanical fix
    sub_opportunities: []
    solutions: []
    provenance:
      evidence_type: anecdotal
      evidence_sources:
        - "private first-run observation 2026-05-10 (generic, source disclosure ack'd 2026-05-13)"
        - "plugins/mycelium/hooks/stop-check.sh"
        - "plugins/mycelium/hooks/session-start.sh:325"
      captured_at: "2026-05-13"
      confidence: 0.45  # Single user + single-file source confirmed via grep; high-frequency surface

  - id: opp-004
    name: "Gate-self-aware-but-unfixed: hardcoded calibration with DEFERRED notes"
    description: |
      First-run user noticed the L0 diamond showed `confidence: 0.15`
      after they had provided answers backed by real underlying
      research data. The user queried the agent; the agent correctly
      identified it as a hardcoded floor for brief-only state and
      named it as "a known calibration issue."

      Source confirmed:
        - `plugins/mycelium/skills/interview/SKILL.md:76` writes
          `confidence: 0.15` with inline comment
          "hardcoded floor for brief-only state — see DEFERRED note at
          end of file".
        - `plugins/mycelium/skills/interview/SKILL.md:418` contains the
          full DEFERRED block:
          `## DEFERRED: confidence-math should be canvas-density-emergent`
          — the skill self-flags that the calibration is wrong but
          ships with the wrong calibration deliberately.

      Meta-pattern: the framework documents known calibration issues
      via DEFERRED notes and ships anyway. From the user side, this
      means the framework actively presents wrong-but-known values
      while having the receipts to know they're wrong. The agent's
      offer to bump 0.15 → 0.25 in this user's case is an in-session
      patch that the framework should not require to apply.

      This is a different category from genuine speculation or
      genuine uncertainty — it's a deliberate ship-with-known-wrong
      pattern. Worth a broader skill audit to find every DEFERRED note
      that affects user-visible values (confidence scores, gate
      thresholds, evidence-decay constants).

      Candidate fixes:
        1. Inventory every DEFERRED note in `plugins/mycelium/skills/`
           that affects user-visible values; classify by "shipping cost
           low" (fix in patch release) vs "shipping cost high" (needs
           design work).
        2. For the specific 0.15 floor: ship the canvas-density-
           emergent confidence calculation, OR if that is out of scope,
           change the brief-only flow so the user is not shown a
           confidence value that the framework knows is wrong.
        3. Standardize: when a DEFERRED issue affects user-visible
           output, surface a one-line caveat at the point of display
           ("this value is a known-rough floor; see /faq").

      **Status 2026-05-13 — SHIPPED (partial graduation)**:
        - 0.15 inline rationale fixed in `interview/SKILL.md:76` from
          "hardcoded floor" to "canvas-density-derived" with formula
          breakdown (purpose 0.05 + JTBD functional 0.05 + workarounds
          0.025 ≈ 0.125 → 0.15). The value was already formula-correct;
          only the framing was misleading.
        - User-facing post-write line added: "L0 confidence set to
          0.15 — this reflects what a 4-question brief can establish..."
          surfaces the formula at point of display (candidate fix #3).
        - DEFERRED block restructured into "Confidence-math: canvas-
          density-emergent (partial)" with checkbox status: brief-only
          ✓ shipped; depth-menu writes ☐, classic Phase 1-6 paths ☐,
          /diamond-assess computation ☐.
        - Trigger from DEFERRED block ("first time a user reports
          unexpected L0 confidence delta") confirmed fired by the
          first-run observation 2026-05-10; documented in DEFERRED
          block.
        - Remaining: full DEFERRED audit across skills (candidate #1);
          depth-menu + classic-path + diamond-assess work (candidate #2
          deeper scope). Bundle into next confidence-related cleanup
          cycle per the trigger rules.
    type: functional
    frequency: medium     # Hits every brief-only L0 entry; lower than per-turn but still per-first-run
    impact: medium        # Trust impact when user notices the discrepancy; bigger downstream cost if they don't notice and trust the floor
    strategic_alignment: high  # Honest-receipts discipline is core L1 framing
    cynefin_domain: complicated  # Known issue with named design tension; needs design choice
    sub_opportunities: []
    solutions: []
    provenance:
      evidence_type: anecdotal
      evidence_sources:
        - "private first-run observation 2026-05-10 (generic, source disclosure ack'd 2026-05-13)"
        - "plugins/mycelium/skills/interview/SKILL.md:76 (hardcoded 0.15 floor)"
        - "plugins/mycelium/skills/interview/SKILL.md:418 (DEFERRED note — full text)"
      captured_at: "2026-05-13"
      confidence: 0.4  # Single user + source-confirmed; broader DEFERRED audit not yet done

  - id: opp-005
    name: "Canvas-writing skills auto-tag source_class silently without user surface"
    description: |
      First-run user noticed that canvas entries had been tagged
      `source_class: internal_stakeholder, validated: false` without
      being asked. The user did not know other classes existed; was
      not consulted on the choice.

      Source confirmed: `plugins/mycelium/skills/interview/SKILL.md:75`
      instructs the skill to "Tag all entries `source_class:
      internal_stakeholder, validated: false`" — the discipline is
      load-bearing (per `plugins/mycelium/domains/discovery/CLAUDE.md`,
      stakeholder claims about users count toward L0 confidence but
      NOT L2 without independent validation; the `validated: false`
      tag creates pressure for `/assumption-test`). The schema in
      `_common.schema.json:41-82` documents all five source classes
      with descriptions.

      But the moment of the write is invisible to the user. They were
      not told the framework was making a classification choice, what
      the choice was, or that the choice can be revised. The
      discipline lives in docs; the practice lives in skill internals;
      the user sees neither.

      Pattern likely systemic: every canvas-writing skill (interview,
      jtbd-map, ost-builder, log-evidence, user-needs-map, gist-plan,
      dora-check, metrics-pull, wardley-map, canvas-update) has to
      make source_class choices. If they all auto-tag silently, the
      same friction recurs across the whole flow.

      Candidate fixes:
        1. Skills that auto-tag a default source_class surface the
           choice when first written — one-line "tagged
           internal_stakeholder per [reason]; correct?".
        2. README-side: explain the five source classes in onboarding,
           not buried in domain docs.
        3. /faq or /canvas-update gains an explicit "revise
           source_class" path so a user who realizes they had real
           interview data behind a brief answer can re-tag without
           hand-editing YAML.

      **Status 2026-05-13 — SHIPPED (partial, precedent set)**:
      candidate fix #1 applied to `/interview` brief flow — third
      post-write line surfaces "Tagged your brief as source_class:
      internal_stakeholder (your own description, not independent user
      evidence yet) + validated: false. If you have real interview
      data..., run /mycelium:assumption-test or /mycelium:log-evidence
      to attach it — the source class then shifts and confidence
      rises. The five source classes are: external_human,
      external_data, internal_stakeholder, internal_desk,
      internal_simulated (see schema for full definitions)."
      Precedent set; remaining canvas-writing skills (jtbd-map,
      ost-builder, log-evidence, user-needs-map, gist-plan, dora-check,
      metrics-pull, wardley-map, canvas-update) still need the same
      surface-the-choice line on their writes. Candidate #2 (README)
      and #3 (/canvas-update revise-source_class path) remain open.
    type: functional
    frequency: high       # Every canvas write hits this
    impact: medium        # Silent default that affects downstream confidence math is a real epistemic cost when wrong
    strategic_alignment: high  # Source_class discipline is L0-L2 confidence-math foundation
    cynefin_domain: complicated  # Discipline is documented; surface design is the gap
    sub_opportunities: []
    solutions: []
    provenance:
      evidence_type: anecdotal
      evidence_sources:
        - "private first-run observation 2026-05-10 (generic, source disclosure ack'd 2026-05-13)"
        - "plugins/mycelium/skills/interview/SKILL.md:75 (auto-tag instruction)"
        - "plugins/mycelium/domains/discovery/CLAUDE.md:49-54 (load-bearing discipline)"
        - "plugins/mycelium/schemas/canvas/_common.schema.json:41-82 (full taxonomy)"
      captured_at: "2026-05-13"
      confidence: 0.45  # Single user + clearly systemic pattern (10+ canvas-writing skills affected by the same default-tag mechanic)

  - id: opp-006
    name: "Internal-vocabulary leak in user-facing prompts (Phase N, Lx, diamond scales)"
    description: |
      During diamond inspection, the agent flagged empty
      `project_type` / `product_type` fields with the phrase
      "The interview skill would normally populate these from Phase 6
      questions." The first-run user did not know what Phase 6 was,
      whether it was something coming later, or something they had
      missed by running `/mycelium:start` instead of
      `/mycelium:interview` directly. Phase-numbering is internal
      skill structure; surfaced to the user without anchor.

      Source confirmed: `plugins/mycelium/skills/interview/SKILL.md`
      uses Phase 0 / Phase 1 / Phase 2 / Phase 3 / Phase 4 / Phase 5
      / Phase 5b / Phase 5c extensively as internal section structure.
      `plugins/mycelium/skills/start/SKILL.md:48` references "interview's
      Phase 0 canvas-state detection" — i.e., skill chains reference
      each other's internal phase numbering. When agents narrate
      "Phase 6" or "Phase 0" to users, internal vocabulary leaks.

      Related: an independent external LLM review of the public repo
      surface on 2026-05-13 enumerated specific framework-internal
      terms ("diamond scales", "leaf lifecycle", "adaptive thresholds",
      "framework reflexion", "evidence decay", "perspective
      resolution") as readable but un-anchored for users without
      prior framework exposure. The Phase-N instance is one example
      of a broader pattern: Mycelium has internal taxonomy that is
      useful for skill authors but unaccountable in user-facing
      prompts.

      Candidate fixes:
        1. Skill-author guideline: phase-numbers and internal
           taxonomy are for SKILL.md structure only; agent narration
           to users uses outcome-shape language ("the part where the
           framework asks about your project type") not structural
           ("Phase 6 questions").
        2. Audit skill files for cross-skill phase references; if
           skill A needs to refer to skill B's structure, name the
           outcome not the index ("the project-type question in
           /interview" not "interview's Phase 6").
        3. Onboarding docs: if certain internal terms (Lx, diamonds,
           canvas) are unavoidable in user-facing material, surface a
           plain-language glossary once, not implicitly.

      **Status 2026-05-13 — SHIPPED (partial, precedent set)**:
      candidate fix #1 + #2 applied:
        - `/interview` SKILL.md gained a NARRATION DISCIPLINE block
          above Phase 1 explicitly forbidding phase-number narration
          to users, with concrete ✗/✓ examples (including the exact
          Phase 6 leak that prompted this entry).
        - `/start` SKILL.md:48 leak fixed — "interview's Phase 0
          canvas-state detection" → "/interview's canvas-state
          detection" + reference to the narration discipline.
      Precedent set; remaining work — skill-file audit for any other
      cross-skill phase-index references (candidate #2 full sweep),
      plain-language glossary in onboarding for unavoidable framework
      vocabulary (candidate #3). ChatGPT 2026-05-13 review enumerated
      six framework-internal terms beyond Phase N (diamond scales,
      leaf lifecycle, adaptive thresholds, framework reflexion,
      evidence decay, perspective resolution) — those need the
      glossary treatment when candidate #3 ships.
    type: functional
    frequency: high       # Phase / Lx vocabulary surfaces across many skill outputs
    impact: medium        # First-impression cost; reinforces the "cult-framework" risk independently observed
    strategic_alignment: high  # The vocabulary-leak pattern is what makes Mycelium feel like methodology-for-methodology; central to L1 activation-cost framing
    cynefin_domain: complicated  # Style/voice discipline + selective rewrite
    sub_opportunities: []
    solutions: []
    provenance:
      evidence_type: anecdotal  # N=1 behavior_validated for the "Phase 6" instance + independent LLM-positioning-mirror observation of the broader pattern
      evidence_sources:
        - "private first-run observation 2026-05-10 (generic, source disclosure ack'd 2026-05-13)"
        - "plugins/mycelium/skills/interview/SKILL.md (Phase 0 through 5c internal structure)"
        - "plugins/mycelium/skills/start/SKILL.md:48 (cross-skill phase reference leak)"
        - "ChatGPT review of public repo surface 2026-05-13 (independent enumeration of self-referential vocabulary — llm_positioning_mirror, not external_human)"
      captured_at: "2026-05-13"
      confidence: 0.5  # Two independent evidence types converging on the same pattern (behavior + careful-reader proxy); higher than single-source instance

  - id: opp-007
    name: "Opaque destination prompts read as background pipeline"
    description: |
      First-run user reached the friction-log capture step and saw
      the prompt "Your answer goes to a receipts case under your name.
      See CONTRIBUTORS.md for how that works." The user read this as
      an opaque pipeline — could not tell whether their input would
      be written to a file, sent somewhere, or aggregated. Asked the
      agent directly what would happen; agent clarified it stays in
      conversation unless the user asks for a file. The user then
      asked for the file write explicitly.

      Source confirmed: `plugins/mycelium/skills/interview/SKILL.md:118`
      contains the literal phrase:
        `"What felt off? Where did the framework get in your way?
         Your answer goes to a receipts case under your name. See
         CONTRIBUTORS.md for how that works."`

      "Goes to a receipts case" implies a destination + transformation
      ("case" suggests a structured artifact, "goes to" suggests
      automation), and "See CONTRIBUTORS.md" defers explanation to a
      different file. At the moment of the prompt, the user has no
      operational answer to "what happens with my input."

      Pattern shape: prompts that reference internal artifacts
      (receipts cases, decision log, canvas, memory) by name without
      specifying the destination at the moment of the prompt. Other
      skills likely have similar phrasings ("logged to decision log",
      "captured in canvas") that suffer the same opacity for new
      users.

      Candidate fixes:
        1. Rewrite the friction-log prompt to be operationally
           explicit at the moment of the question: "If you want, I'll
           write your answer to [.claude/evals/dogfood-reports/...]
           so it's preserved across sessions. Just text in chat is
           also fine." User-controlled destination, named at the
           point of decision.
        2. Audit other prompts that reference internal artifacts;
           same surgery applies where opacity exists.
        3. Long-term: the "receipts case" concept could surface in
           README so the vocabulary is anchored before a skill uses
           it.

      **Status 2026-05-13 — SHIPPED**: candidate fix #1 applied to
      `interview/SKILL.md:123` friction-log prompt. Rewritten to name
      three concrete destinations with explicit consent gates: (a)
      default stays in conversation, (b) opt-in file write to
      `.claude/evals/dogfood-reports/YYYY-MM-DD-friction.md`, (c)
      opt-in public receipts case with explicit pre-publish ask. No
      more opaque-pipeline shape. opp-007 closed. Candidates #2
      (broader audit) and #3 (README anchor) remain open.
    type: functional
    frequency: medium     # Friction-log specific instance; pattern more frequent across skills
    impact: low           # Cosmetic + first-trust; user worked around easily
    strategic_alignment: medium  # Prompt-clarity discipline is part of the broader "feel-lightweight" surface
    cynefin_domain: clear  # Prompt-copy edits; deterministic
    sub_opportunities: []
    solutions: []
    provenance:
      evidence_type: anecdotal
      evidence_sources:
        - "private first-run observation 2026-05-10 (generic, source disclosure ack'd 2026-05-13)"
        - "plugins/mycelium/skills/interview/SKILL.md:118 (literal source of the prompt)"
      captured_at: "2026-05-13"
      confidence: 0.4  # Single user + source-confirmed; pattern likely broader but not exhaustively audited

  - id: opp-008
    name: "Cross-cutting sub-OSTs surfaced during delivery exploration aren't portable across parent solutions"
    description: |
      When delivery exploration of a top-level solution surfaces a
      sub-OST (e.g., solution A "logged-in portal" needs to choose
      between auth-X, auth-Y, auth-Z), the discovery work — four-risks,
      ICE, assumption tests, spike results — is locked to solution A.
      If a competing parent solution B later needs the same cross-cutting
      concern (auth), the framework provides no mechanism to surface
      "the work done on auth-X is reusable here." B's discovery has to
      rediscover independently, or the agent/user has to manually
      remember and re-cite.

      Current schema is tree-shaped:
      - `opportunities.schema.json` allows `sub_opportunities` (nested
        same-shape) and `solutions` (flat array per opportunity).
        Sub-opportunities is unused in practice.
      - Solutions are owned by a single parent opportunity. No
        many-to-one or many-to-many.
      - L4 sub-diamonds exist (`diamond-rules.md`) but they're delivery
        sub-diamonds, not OST sub-trees that can be shared.
      - Bounded contexts (`canvas/bounded-contexts.yml`, Phase 6 of
        leaf-lifecycle) are closest to a shared-concern primitive but
        currently tied to specific solutions, not first-class reusable
        components.
      - Trace edges (`_common.schema.json#/$defs/trace`) and
        `validate_canvas.py` cycle detection already provide the
        infrastructure for DAG-style cross-references. Just not used
        at the OST level.

      Real-world cases where this hurts: authentication, payments,
      observability, i18n, accessibility, error handling. These are
      quintessentially cross-cutting — they emerge during exploration
      of nearly any feature solution, and the right choice in one
      context is usually the right choice in another.

      Torres's own CDH doesn't fully solve this either; she nests
      within a single tree. The 2026-05-13 Torres-Vistaly piece
      (`producttalk.org/behind-the-scenes-ai-osts/`) is suggestive of
      the right shape: her service emits explicit *merge* operations
      when updating an OST, alongside add/delete/reframe/split. Merge
      is structurally exactly the cross-applicability move ("A's auth
      sub-OST is equivalent to B's auth sub-OST — record the shared
      discovery without committing to a permanent DAG"). The tree
      stays tree-shaped at any given moment; merge is how
      cross-applicability is captured.

      This opportunity converges with the deferred OST-update-with-
      change-set gap also surfaced by the Torres signal yesterday
      (`skills/ost-builder/SKILL.md` Theory Citations note, v0.23.17).
      They are the same design need approached from two directions:
      one says "we need to update an OST and surface the diff"; the
      other says "we need to share discoveries across parent solutions."
      Both want change sets with merge as a primitive.
    type: functional
    frequency: high  # Cross-cutting concerns are pervasive — surface in nearly any non-trivial solution exploration
    impact: medium  # Workaround exists (rediscover or manually trace); cost is wasted exploration cycles and lost evidence reuse
    strategic_alignment: high  # Directly affects framework's claim to handle OST work end-to-end; failure to model this leaks discipline at the delivery boundary
    cynefin_domain: complicated  # Solvable via established schema design (DAG, references, bounded contexts) but requires deliberate work — not a fresh complex domain
    sub_opportunities: []
    solutions: []
    provenance:
      evidence_type: anecdotal  # Conversational surface (founder 2026-05-15) + framework convergence with Torres 2026-05-13 signal; no behavior-validated instance yet
      evidence_sources:
        - "founder conversation 2026-05-15 ('the OST in Mycelium generates branches of new OSTs/foliages — auth X/Y/Z might fit either solution A or B')"
        - "Torres 2026-05-13: https://www.producttalk.org/behind-the-scenes-ai-osts/ (change-set semantics including merge as cross-applicability primitive)"
        - "plugins/mycelium/engine/leaf-lifecycle.md (Phase 6 bounded-contexts — current closest primitive)"
        - "plugins/mycelium/engine/diamond-rules.md (L4 sub-diamond rule — delivery-side spawning, not OST-side sharing)"
        - "plugins/mycelium/schemas/canvas/opportunities.schema.json (tree-shaped solutions[] array per opportunity)"
        - "plugins/mycelium/skills/ost-builder/SKILL.md Theory Citations (2026-05-13 Torres OST-update gap note, v0.23.17)"
      captured_at: "2026-05-15"
      confidence: 0.35  # Real design tension named by founder + Torres convergence; no behavior-validated user instance, no prototype, no scoping spike. Promotion path: when a real diamond surfaces auth/payments/observability as a sub-OST and the rediscovery cost becomes visible.
    notes: |
      **Out of scope for v0.23.x.** This is framework L2 work — needs
      its own diamond, not a patch. Three implementation paths
      enumerated in 2026-05-15 conversation:
        (A) Convention-only: use existing `trace.upstream` to manually
            reference shared sub-opportunities. Zero schema change;
            relies on discipline. Cheapest entry point.
        (B) Promote bounded-contexts to first-class reusable solution
            components (DDD-aligned). Schema change, validator update,
            retroactive migration.
        (C) New `solution_components.yml` canvas for cross-cutting
            sub-units. Each has own four-risks, ICE, assumption-tests.
            Largest scope; cleanest semantics.
        (D) Implement merge-as-primitive (Torres-shape): when
            delivery-exploration sub-solutions converge across parents,
            emit a merge change set rather than committing to a
            permanent DAG. Lazy DAG-isation; closest to OST-update gap.

      ICE scoring + assumption test deferred to diamond start. Will
      converge with `skills/ost-builder/SKILL.md` deferred-update gap
      (v0.23.17 Theory Citations note) — they should be one design
      diamond, not two.

  - id: opp-009
    name: "Delivery-pipeline quality skills cluster on web/GUI; other interface modalities under-covered"
    description: |
      Mycelium's `delivery_types` taxonomy is modality-aware
      (`user_facing`, `api_service`, `cli_tool` are distinct entries with
      tailored detection patterns) but the actual evaluation skills
      cluster heavily around web/GUI:
        - `usability-check` (Nielsen 10) — web/GUI-first
        - `a11y-check` (WCAG 2.1 AA) — web/mobile-first
        - `service-check` (Downe 15) — service-level, mostly govtech/web

      Coverage matrix as of 2026-05-15:
        - **Visual GUI** (web/mobile): strong (Nielsen + WCAG + Downe).
        - **API / DevEx**: partial — security-strong via threat-model /
          security-review / privacy-check, but no API design quality
          skill (no REST conventions, error-message review, versioning,
          SDK ergonomics, documentation review). The framework's own
          DevEx would fail this missing review.
        - **CLI / TUI**: weak — `cli_tool` delivery type detects CLI
          and flags input validation only. No skill for CLI ergonomics
          (help output, flag naming, color-blind-safe terminal output,
          exit codes, piping/composition, TUI patterns).
        - **Conversational / chat UI**: weak — `xai-check` covers
          explainability, `ai_safety` covers harm, but nothing on
          turn-taking, error recovery, persona consistency, message
          scannability, retry-affordance. Notable since Mycelium itself
          operates IN a chat UI (Claude Code).
        - **Voice / audible**: very weak — `content_media` covers audio
          production quality (caption/transcript discipline) but no
          conversational voice UX (Alexa/Siri shape), audio earcons,
          spatial audio, voice-only navigation.
        - **Tactile / haptic**: zero.
        - **Multi-modal coherence** (product with visual + voice + API
          surfaces, e.g., smart home): zero — each modality evaluated
          in isolation, no consistency check across them.
        - **DevEx of Mycelium-itself**: self-blind. Frida ht-012
          friction log contains DevEx evidence (permission prompts,
          vocabulary opacity, time-budget consistency drift) but no
          skill catches that class systematically. Recursion-flavored
          — framework's discipline doesn't apply to framework's own
          interface to users.

      Additional surfaces surfaced 2026-05-15 (see notes block for the
      expanded matrix): notification surfaces (push/in-app/email/SMS),
      wearable / glance-able (smartwatch / fitness band tiny screens),
      AR/VR / spatial / 3D, TV / 10-foot UI, embedded / IoT physical
      devices (LEDs, segment displays, single-button), voice-only IVR,
      sign-language overlays, refreshable braille / assistive tactile,
      eye / gaze input, BCI (frontier), agent-as-interface (an AI
      agent IS the user's surface — Mycelium is structurally in this
      class but has no skill for evaluating agent-as-product),
      documentation / error-message text as interface, structured-form
      input (govtech / healthcare), webhook / event-driven async
      interfaces (B2B), embed / widget surfaces (sitting inside
      another product's frame), bot-in-platform (Slack/Discord/Teams),
      print (PDFs, physical mail, receipts).

      Strong coverage = current user base (mostly web app builders).
      Self-consistent, not a flaw — but a scope statement that
      Mycelium currently doesn't make explicit.
    type: functional
    frequency: medium  # Becomes high when Mycelium reaches users outside the web/GUI baseline; today it's a latent gap
    impact: medium  # Workaround: bring-your-own evaluation criteria. Cost is missed friction surfaces and the framework underclaiming its own coverage boundary.
    strategic_alignment: high  # Tied to L1 positioning — Mycelium claims to be a theory-grounded harness for "product development", not specifically web-product development. Coverage gap weakens the general-purpose claim.
    cynefin_domain: complicated  # Per-modality evaluation criteria are well-established in their respective communities (clig.dev for CLI, NN/g voice UX for voice, etc.); the work is integration, not invention
    sub_opportunities: []
    solutions: []
    provenance:
      evidence_type: anecdotal  # Conversational surface (founder 2026-05-15) + desk-mapped against current SKILL.md inventory and canvas-guidance.yml taxonomy; no behavior-validated user instance of the gap
      evidence_sources:
        - "founder conversation 2026-05-15 ('how well does Mycelium optimize for user interfaces in the delivery pipeline?')"
        - "plugins/mycelium/skills/usability-check/SKILL.md (Nielsen 10, web-first)"
        - "plugins/mycelium/skills/a11y-check/SKILL.md (WCAG 2.1 AA, web/mobile)"
        - "plugins/mycelium/skills/service-check/SKILL.md (Downe 15, service-level)"
        - "plugins/mycelium/engine/canvas-guidance.yml (delivery_types: user_facing, api_service, cli_tool taxonomy)"
        - "plugins/mycelium/domains/delivery/CLAUDE.md (product type awareness section)"
        - ".claude/canvas/human-tasks.yml#ht-012 (Frida ht-012 partial_findings — DevEx friction class evidence)"
      captured_at: "2026-05-15"
      confidence: 0.35  # Real coverage map, conversationally surfaced; needs a real user with a non-web modality (voice/CLI/wearable) hitting a gap before promotion to data-supported. Promotion candidate: when Juniors.dev cohort or another user works on a non-web product and identifies a missing evaluation skill.
    notes: |
      **Out of scope for v0.23.x.** This is framework L2 work — needs
      its own diamond. Three implementation paths enumerated in
      2026-05-15 conversation:
        (A) Document the scope boundary (lowest cost): add a "modality
            coverage matrix" to canvas-guidance.yml or
            docs/architecture.md. Honest, no scope creep.
        (B) Adopt-existing-frameworks for high-impact gaps: ship
            `devex-check` (Stripe-style API consistency +
            error-message + onboarding patterns), `cli-check`
            (clig.dev / Heroku CLI style), `chat-check` (turn-taking,
            persona consistency). 3 new skills, each maps to a real
            industry framework. ~1 design-diamond each. Prioritize by
            real-user need (Juniors.dev cohort = DevEx + chat UX,
            given how they encounter Mycelium).
        (C) Defer voice/haptic/multi-modal: niche enough today that
            thin coverage is worse than acknowledged absence.

      Founder direction 2026-05-15: ship A immediately (cheap
      honesty), B as deferred work prioritized by real-user need, C —
      hold.

      **Expanded modality matrix** (additional surfaces surfaced
      2026-05-15 after initial coverage map):
        - Notification surfaces (push, in-app, email, SMS) — modal
          that interrupts other contexts; transactional-email design
          is its own discipline
        - Wearable / glance-able (smartwatch, fitness band) —
          sub-modal of visual but with tight constraints (tiny
          screen, glance-only attention budget)
        - AR / VR / spatial / 3D (immersive, gesture, mixed reality)
        - TV / 10-foot UI (limited input, distance reading,
          remote-control navigation)
        - Embedded / IoT physical device UX (LEDs, segment displays,
          single-button affordances, no screen)
        - Automotive (CarPlay/Android Auto, in-vehicle infotainment —
          glanceable, hands-mostly-occupied)
        - Game UI (HUD, controller-driven, performance-critical)
        - Voice-only IVR / phone tree (call-center UX)
        - Sign-language overlay / interpreter (live or recorded
          accessibility-modal)
        - Refreshable braille / assistive tactile (real, used,
          under-served by mainstream UX)
        - Eye / gaze input (accessibility + spatial computing
          intersection)
        - BCI / brain-computer interface (frontier — Neuralink etc.;
          not worth modeling today, watch)
        - **Agent-as-interface** (the AI agent IS the user's surface;
          this is the class Mycelium itself inhabits as an
          interpretive layer over Claude Code; no skill for evaluating
          agent-as-product even though that's the framework's own
          shape — recursion-blind)
        - Documentation / error-message text as interface (the words
          ARE the UI for many products; closest skill is the
          forthcoming devex-check)
        - Structured-form input (govtech/healthcare paper-equivalent
          forms — Downe service-check touches this but doesn't fully
          cover form-design ergonomics)
        - Webhook / event-driven async interfaces (B2B; API design
          skill would cover most of this)
        - Embed / widget surfaces (sitting inside another product's
          frame, e.g., a calendar widget on a third-party page —
          constraint set is distinct)
        - Bot-in-platform (Slack/Discord/Teams bot UIs — also
          embedded; turn-taking + invocation discoverability are
          central)
        - Print (generated PDFs, physical mail, receipts, tickets —
          one-shot, no follow-up affordance)
        - Spatial audio / 3D positional sound (not just stereo voice;
          gaming + AR/VR + accessibility)
        - Olfactory / gustatory / scent: extreme niche, skip

      The expanded list is meant to be exhaustive-enough to make the
      scope-boundary statement honest, not to be a roadmap. Ship A
      as the boundary documentation; B addresses the highest-pain
      subset.
    trace:
      upstream:
        - target_id: "opp-008"
          relationship: "sibling — both are framework-design-tension opportunities surfaced via founder conversation 2026-05-15; both await a real-diamond instance to promote from anecdotal to data-supported"

