# ============================================================
# Core Pages — Are Halland (The Core Model)
# Optional extension for content-heavy products (content_course,
# content_publication, content_media, service_offering with web presence).
# Maps pages where user tasks and business objectives intersect,
# then designs navigation pathways around them.
# Source: Halland, "The Core Model" (2007, thecoremodel.com)
# ============================================================

core_pages: []
