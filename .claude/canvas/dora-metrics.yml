# DORA Metrics Canvas — Forsgren, Humble, Kim
# Source: "Accelerate: The Science of Lean Software and DevOps"
# Populated through: /dora-check skill

# The Four Key Metrics
deployment_frequency:
  current: ""
  target: ""
  classification: null  # elite|high|medium|low
  # Elite: On-demand (multiple/day) | High: Weekly-monthly | Medium: Monthly-6mo | Low: >6mo

lead_time_for_changes:
  current: ""
  target: ""
  classification: null
  # Elite: <1 hour | High: 1 day-1 week | Medium: 1 week-1 month | Low: >1 month

change_failure_rate:
  current: ""
  target: ""
  classification: null
  # Elite: 0-15% | High: 16-30% | Medium: 31-45% | Low: 46-60%

time_to_restore:
  current: ""
  target: ""
  classification: null
  # Elite: <1 hour | High: <1 day | Medium: 1 day-1 week | Low: >1 week

overall_classification: null  # elite|high|medium|low

