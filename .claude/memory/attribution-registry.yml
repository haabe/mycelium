# Attribution registry — used by Check 33 (plugin tree must not contain
# unconsented personal identifiers).
#
# This file is committed to the repo but lives OUTSIDE plugins/mycelium/,
# so the registry itself is never distributed to downstream users.
#
# consent values:
#   public_ok      — explicit consent to appear by name in plugin-distributed content
#   generic_only   — identity allowed in repo-root logs (changelog, corrections)
#                    but MUST be generic-framed inside plugins/mycelium/**
#   unknown        — consent state unverified; treated as generic_only pending
#                    clarification
#
# Adding a name without a consent value fails registry parsing → check fails.
# This forces deliberate consent decisions at the point of adding a name.
#
# Check 33 is WARN-only initially (observability before enforcement per
# framework discipline). Graduates to FAIL once existing pre-disclosure
# leaks are addressed.

people:
  - name: "Frida"
    consent: generic_only
    note: |
      2026-05-13 disclosure-and-ack established two-surface consent:
      generic-in-framework OK, receipts attribution needs separate sign-off.
      2026-05-14 follow-up: she delegated the framework-internal framing
      choice back to me; that delegation is not consent to name.
      Pre-existing leak: plugins/mycelium/harness/anti-patterns.md
      (graduated 2026-05-09, before the disclosure conversation — not a
      knowing violation but a current shipping leak).

  - name: "Drew"
    consent: public_ok
    note: "Explicit consent for public attribution."

  - name: "Simon"
    consent: unknown
    note: |
      Consent state unverified. Treat as generic_only pending clarification.
      Pre-existing references in two places:
        - plugins/mycelium/engine/feedback-loops.md (first-name only;
          "Drew/Simon outreach session")
        - plugins/mycelium/harness/theory-tensions.md (FULL NAME: "Simon
          Rohrer", attributing LinkedIn feedback that motivated the file).
      The full-name reference is the higher-doxing-risk surface — LinkedIn
      attribution is plausibly public context, but consent for republication
      in framework files is a separate question from "they posted publicly."
      First-name-only references are lower risk but still attribution
      surfaces; the framework's discipline applies independent of doxing risk.
