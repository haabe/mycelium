# Attribution registry — used by Check 33 (plugin tree must not contain
# unconsented personal identifiers).
#
# This file is committed to the repo but lives OUTSIDE plugins/mycelium/,
# so the registry itself is never distributed to downstream users.
#
# consent values:
#   public_ok      — citing this person by name is consistent with the
#                    original publication context. Covers two sub-cases:
#                      (a) Public figures cited as theory/framework
#                          originators in their published work (Torres,
#                          Christensen, Cagan, etc.). Standard academic
#                          citation norm. These typically do NOT need a
#                          registry entry — last-name-only citations of
#                          published work are covered by citation norms.
#                      (b) Individuals who gave feedback in public or
#                          effectively-public channels (open Slack threads,
#                          LinkedIn, conference talks, blog posts).
#                          Quotable without permission per the Norwegian
#                          standard that treats large "closed" groups as
#                          public-equivalent. These DO get registry entries
#                          for first-name disambiguation.
#   generic_only   — gave feedback in a private channel (email, DM, 1:1
#                    observation, genuinely-private group). Identity
#                    allowed in repo-root logs (changelog, corrections) but
#                    MUST be generic-framed inside plugins/mycelium/**.
#                    Receipts-attribution needs separate explicit sign-off.
#   unknown        — consent state unverified; treated as generic_only
#                    pending clarification.
#
# Why first-name entries matter even for public_ok individuals:
# "Drew", "Simon", "Frida" are common first names. Multiple people share
# them. The registry records WHICH "Simon" is referenced in which file so
# the team can disambiguate later. This is repo-internal — none of this
# information leaks to plugin users.
#
# Out of scope for this registry:
#   - Theory originators cited last-name-only in plugin docs (Pearl,
#     Kahneman, Saltzer & Schroeder, Brooks, etc.) — covered by standard
#     citation norms. No entry needed unless a first-name reference appears.
#
# Adding a name without a consent value fails registry parsing → check
# fails. This forces deliberate consent decisions at the point of adding
# a name.
#
# Check 33 is WARN-only initially (observability before enforcement per
# framework discipline). Graduates to FAIL once existing pre-disclosure
# leaks are addressed.

people:
  - name: "Frida"
    consent: generic_only
    note: |
      2026-05-13 disclosure-and-ack established two-surface consent:
      generic-in-framework OK, receipts attribution needs separate sign-off.
      2026-05-14 follow-up: she delegated the framework-internal framing
      choice back to me; that delegation is not consent to name.
      Pre-existing leak: plugins/mycelium/harness/anti-patterns.md
      (graduated 2026-05-09, before the disclosure conversation — not a
      knowing violation but a current shipping leak).

  - name: "Drew"
    consent: public_ok
    note: |
      Explicit consent for public attribution given prior to inclusion.
      Registered here for first-name disambiguation — "Drew" is common.

  - name: "Simon"
    consent: public_ok
    note: |
      Simon Rohrer. The "Simon Rohrer (LinkedIn feedback, v0.8.x)"
      attribution in plugins/mycelium/harness/theory-tensions.md cites
      public LinkedIn commentary; quotable without permission per
      standard public-statement norms. The "Drew/Simon outreach session"
      reference in plugins/mycelium/engine/feedback-loops.md cites a
      public-or-effectively-public Slack thread, also quotable per the
      Norwegian standard that treats large "closed" groups as
      public-equivalent (Supreme Court precedent on large Facebook
      groups; same logic applies to open or member-of-many Slack
      workspaces).
      Registered here (rather than omitted as "obviously public") for
      first-name disambiguation — "Simon" is common; the registry
      records WHICH Simon is meant in which file.
